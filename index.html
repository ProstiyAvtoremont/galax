<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Бесконечная Галактика</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            background-color: #000;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            pointer-events: none;
        }
        .content {
            position: relative;
            z-index: 2;
            color: white;
            font-family: sans-serif;
        }
        .screen {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }
    </style>
    <!-- Подключаем Three.js -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <canvas id="galaxy"></canvas>

    <!-- Вы можете добавлять или удалять экраны. Код сам создаст под них звезды -->
    <div class="content">
        <div class="screen">Экран 1: Центр Галактики</div>
        <div class="screen">Экран 2: Рукав Ориона</div>
        <div class="screen">Экран 3: Звездное скопление</div>
        <div class="screen">Экран 4: Край вселенной</div>
    </div>

    <script>
        // --- НАСТРОЙКИ ---
        const STARS_PER_SCREEN = 10000; // Количество звезд на один экран
        const STAR_SIZE = 0.15;          // Базовый размер звезд

        // --- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ---
        const canvas = document.getElementById('galaxy');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- СОЗДАНИЕ БЕСКОНЕЧНОЙ ГАЛАКТИКИ ---
        const screens = document.querySelectorAll('.screen');
        const totalScreens = screens.length;
        const totalStars = STARS_PER_SCREEN * totalScreens;

        // Геометрия одной звезды (сфера)
        const starGeometry = new THREE.SphereGeometry(STAR_SIZE, 4, 4);

        // Кастомный материал для эффекта мерцания через шейдеры (работает очень быстро)
        const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        // Магия мерцания: модифицируем стандартный материал Three.js
        starMaterial.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = { value: 0 };
            starMaterial.userData.shader = shader;

            // Добавляем переменные для передачи случайной фазы мерцания
            shader.vertexShader = `
                attribute float aPhase;
                varying float vPhase;
                ${shader.vertexShader}
            `.replace(
                `#include <begin_vertex>`,
                `#include <begin_vertex>
                 vPhase = aPhase;`
            );

            // Формула мерцания в пиксельном шейдере
            shader.fragmentShader = `
                uniform float uTime;
                varying float vPhase;
                ${shader.fragmentShader}
            `.replace(
                `vec4 diffuseColor = vec4( diffuse, opacity );`,
                `// Создаем синусоиду мерцания на основе времени и личной фазы звезды
                 float blink = 0.3 + 0.7 * sin(uTime * 3.0 + vPhase * 60.0);
                 vec4 diffuseColor = vec4( diffuse * blink, opacity );`
            );
        };

        // Создаем InstancedMesh — один объект, который отрисует ВСЕ тысячи звезд разом
        const starMesh = new THREE.InstancedMesh(starGeometry, starMaterial, totalStars);
        
        // Добавляем массив фаз для мерцания
        const phases = new Float32Array(totalStars);
        const dummy = new THREE.Object3D();

        let starIndex = 0;

        // Распределяем звезды по виртуальным экранам в глубину сцены
        for (let s = 0; s < totalScreens; s++) {
            // Смещение экрана по оси Z (каждый экран находится дальше предыдущего)
            const zOffset = -s * 10; 

            for (let i = 0; i < STARS_PER_SCREEN; i++) {
                // Случайные координаты в пределах видимости одного экрана
                const x = (Math.random() - 0.5) * 15;
                const y = (Math.random() - 0.5) * 10;
                // Небольшой разброс по глубине внутри самого экрана
                const z = zOffset + (Math.random() - 0.5) * 8; 

                dummy.position.set(x, y, z);
                dummy.updateMatrix();
                
                // Записываем позицию в общую матрицу
                starMesh.setMatrixAt(starIndex, dummy.matrix);
                
                // Случайная фаза для уникального ритма мерцания каждой звезды
                phases[starIndex] = Math.random();
                
                starIndex++;
            }
        }

        // Передаем фазы в геометрию
        starGeometry.setAttribute('aPhase', new THREE.InstancedBufferAttribute(phases, 1));
        scene.add(starMesh);

        // --- ИНТЕГРАЦИЯ С СКРОЛЛОМ ---
        let targetScrollY = 0;
        let currentScrollY = 0;

        window.addEventListener('scroll', () => {
            targetScrollY = window.scrollY;
        });

        // --- АНИМАЦИЯ ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();
            
            // Обновляем время в шейдере для мерцания
            if (starMaterial.userData.shader) {
                starMaterial.userData.shader.uniforms.uTime.value = time;
            }

            // Плавное движение камеры при скролле (камера движется сквозь галактику вглубь)
            currentScrollY += (targetScrollY - currentScrollY) * 0.05; // 0.05 — плавность доводки
            
            const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
            if (maxScroll > 0) {
                const scrollPercent = currentScrollY / maxScroll;
                // Камера перемещается по оси Z вслед за скроллом
                camera.position.z = 5 - (scrollPercent * (totalScreens - 1) * 10);
            }

            renderer.render(scene, camera);
        }

        // --- АДАПТИВНОСТЬ ПОД ЭКРАНЫ ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Запуск
        animate();
    </script>
</body>
</html>
