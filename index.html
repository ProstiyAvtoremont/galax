<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Бесконечная Галактика</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
    <!-- Подключаем стабильную версию Three.js -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <canvas id="galaxy"></canvas>

    <script>
        // --- НАСТРОЙКИ ---
        const TOTAL_SECTIONS = 6;        // Количество секторов глубины
        const STARS_PER_SECTION = 10000; // Звезд на один сектор (всего 60 000)
        const BASE_STAR_SIZE = 4.0;      // Размер обычных звезд в пикселях
        const FLIGHT_SPEED = 6.0;        // Скорость автоматического полета

        // --- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ---
        const canvas = document.getElementById('galaxy');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; 

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- СОЗДАНИЕ СИСТЕМЫ ЧАСТИЦ (ЗВЕЗД) ---
        const totalStars = STARS_PER_SECTION * TOTAL_SECTIONS;
        const geometry = new THREE.BufferGeometry();
        
        // Массивы для хранения параметров каждой звезды
        const positions = new Float32Array(totalStars * 3);
        const colors = new Float32Array(totalStars * 3);
        const sizes = new Float32Array(totalStars);
        const phases = new Float32Array(totalStars);

        const sectionDepth = 25; 
        let starIndex = 0;

        // Распределяем 60 000 звезд по космосу
        for (let s = 0; s < TOTAL_SECTIONS; s++) {
            const zOffset = -s * sectionDepth;

            for (let i = 0; i < STARS_PER_SECTION; i++) {
                // Координаты
                positions[starIndex * 3] = (Math.random() - 0.5) * 60;     // X
                positions[starIndex * 3 + 1] = (Math.random() - 0.5) * 40; // Y
                positions[starIndex * 3 + 2] = zOffset + (Math.random() - 0.5) * sectionDepth; // Z

                // Начальный белый цвет (RGB: 1, 1, 1)
                colors[starIndex * 3] = 1.0;
                colors[starIndex * 3 + 1] = 1.0;
                colors[starIndex * 3 + 2] = 1.0;

                // Базовый размер
                sizes[starIndex] = BASE_STAR_SIZE;

                // Случайная фаза/скорость для мерцания
                phases[starIndex] = 2.0 + Math.random() * 5.0;

                starIndex++;
            }
        }

        // Записываем массивы в геометрию Three.js
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // Создаем текстуру круглой светящейся точки (чтобы звезды не были квадратными пикселями)
        const createStarTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        };

        // Специальный материал для частиц с поддержкой кастомных шейдеров размера
        const material = new THREE.PointsMaterial({
            size: 1.0,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            map: createStarTexture()
        });

        // Кастомный шейдер, который связывает массив размеров sizes с экраном
        material.onBeforeCompile = (shader) => {
            geometry.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
            
            shader.vertexShader = `
                attribute float aSize;
                ${shader.vertexShader}
            `.replace(
                `gl_PointSize = size;`,
                `gl_PointSize = aSize;`
            );
        };

        const starPoints = new THREE.Points(geometry, material);
        scene.add(starPoints);

        // --- ИНТЕРАКТИВ (НАВЕДЕНИЕ МЫШИ) ---
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 0.3; // Радиус захвата мыши вокруг звезды
        
        const mouse = new THREE.Vector2(-100, -100);
        let hoveredIndex = null;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('mouseleave', () => {
            mouse.set(-100, -100);
        });

        function updateHover() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(starPoints);

            if (intersects.length > 0) {
                // Берем индекс конкретной точки в массиве
                const idx = intersects[0].index;

                if (hoveredIndex !== idx) {
                    if (hoveredIndex !== null) resetStar(hoveredIndex);
                    hoveredIndex = idx;
                    highlightStar(idx);
                }
            } else {
                if (hoveredIndex !== null) {
                    resetStar(hoveredIndex);
                    hoveredIndex = null;
                }
            }
        }

        function highlightStar(idx) {
            // Увеличиваем в 10 раз (с 4px до 40px)
            const sizeAttr = geometry.getAttribute('aSize');
            if (sizeAttr) {
                sizeAttr.setX(idx, BASE_STAR_SIZE * 10);
                sizeAttr.needsUpdate = true;
            }

            // Красим в ярко-желтый цвет
            const colorAttr = geometry.getAttribute('color');
            colorAttr.setXYZ(idx, 1.0, 0.85, 0.0); // Желтый (RGB)
            colorAttr.needsUpdate = true;
        }

        function resetStar(idx) {
            // Возвращаем исходный размер
            const sizeAttr = geometry.getAttribute('aSize');
            if (sizeAttr) {
                sizeAttr.setX(idx, BASE_STAR_SIZE);
                sizeAttr.needsUpdate = true;
            }

            // Возвращаем белый цвет
            const colorAttr = geometry.getAttribute('color');
            colorAttr.setXYZ(idx, 1.0, 1.0, 1.0);
            colorAttr.needsUpdate = true;
        }

        // --- АНИМАЦИЯ ---
        const clock = new THREE.Clock();
        const totalDepth = TOTAL_SECTIONS * sectionDepth;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            // Динамическое мерцание обычных звезд
            const colorAttr = geometry.getAttribute('color');
            for (let i = 0; i < totalStars; i++) {
                if (i !== hoveredIndex) {
                    // Мерцание: меняем яркость белого цвета по синусоиде от 0.2 до 1.0
                    const brightness = 0.2 + 0.8 * Math.abs(Math.sin(time * phases[i]));
                    colorAttr.setXYZ(i, brightness, brightness, brightness);
                }
            }
            colorAttr.needsUpdate = true;

            // Камера непрерывно летит вперед по оси Z
            camera.position.z -= FLIGHT_SPEED * delta;

            // Эффект бесконечной галактики (перенос камеры на старт)
            if (camera.position.z < -totalDepth) {
                camera.position.z = 5;
            }

            updateHover();
            renderer.render(scene, camera);
        }

        // --- АДАПТИВНОСТЬ ОКНА ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Запуск
        animate();
    </script>
</body>
</html>
