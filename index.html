<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE Starfield Space — Buy Your Own Star</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010105;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        .controls-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .ui-btn {
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .ui-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* NEW: Search Bar Panel Styling */
        .search-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            display: flex;
            gap: 10px;
            background: rgba(5, 5, 15, 0.6);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 5px 15px;
            font-size: 13px;
            width: 140px;
        }
        .search-btn {
            background: #ffd700;
            border: none;
            color: #000;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-btn:hover {
            background: #fff;
        }

        /* Hover Tooltip Card */
        #star-tooltip {
            position: absolute;
            padding: 15px;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid #ffd700;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            min-width: 220px;
        }
        #star-tooltip.supernova { border-color: #ff3366; box-shadow: 0 0 25px rgba(255, 51, 102, 0.3); }
        #star-tooltip.constellation { border-color: #00ffff; box-shadow: 0 0 25px rgba(0, 255, 255, 0.3); }
        
        .tooltip-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #ffd700; }
        #star-tooltip.supernova .tooltip-title { color: #ff3366; }
        #star-tooltip.constellation .tooltip-title { color: #00ffff; }
        .tooltip-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.7; }
        .tooltip-meta { color: #888; font-size: 10px; margin-top: 8px; word-break: break-all; }

        /* Neon Payment Modal */
        #payment-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(7, 7, 20, 0.95);
            border: 1px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
            border-radius: 20px;
            padding: 25px;
            width: 360px;
            text-align: center;
            backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #payment-modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            color: #aaa;
            font-size: 20px;
        }

        .tier-box {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
            text-align: left;
        }
        .tier-box.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

        .input-group {
            text-align: left;
            margin-top: 12px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: #ffd700;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 11px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .input-field:focus {
            border-color: #ffd700;
        }

        .pay-btn {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            margin-top: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        .pay-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="number" id="search-input" class="search-input" placeholder="Star ID (0-1999999)" min="0" max="1999999">
        <button id="search-btn" class="search-btn">SEARCH</button>
    </div>

    <canvas id="starfield"></canvas>
    
    <div class="controls-container">
        <button class="ui-btn" id="audio-btn">ENABLE AMBIENT</button>
    </div>

    <div id="star-tooltip"></div>

    <div id="payment-modal">
        <span class="modal-close" id="modal-close">&times;</span>
        <h3 id="modal-title" style="color: #ffd700; margin-top: 0; margin-bottom: 5px;">Claim This Star</h3>
        <p style="font-size: 12px; opacity: 0.7; margin-bottom: 15px;">Immortalize your name on the galaxy map via DOGE.</p>
        
        <div class="tier-box selected" data-tier="basic" data-price="7">
            <div style="font-weight:bold; color:#ffd700;">⭐ Basic Star (~7 DOGE)</div>
        </div>
        <div class="tier-box" data-tier="supernova" data-price="28">
            <div style="font-weight:bold; color:#ff3366;">✨ Supernova (~28 DOGE)</div>
        </div>
        <div class="tier-box" data-tier="constellation" data-price="250">
            <div style="font-weight:bold; color:#00ffff;">🌌 Constellation (~250 DOGE)</div>
        </div>

        <div class="input-group">
            <label for="star-owner">X (Twitter) Handle / Name</label>
            <input type="text" id="star-owner" class="input-field" placeholder="@elonmusk" maxlength="30">
        </div>
        <div class="input-group">
            <label for="star-msg">Your Message</label>
            <input type="text" id="star-msg" class="input-field" placeholder="To the moon! 🚀" maxlength="60">
        </div>

        <button class="pay-btn" id="pay-btn">Proceed to Web3 Payment</button>
    </div>

    <script>
        const SUPABASE_URL = "https://supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbHRua3dya2l4bm1neW9ucXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDU3MTMsImV4cCI6MjA5NDYyMTcxM30.FwI-F6eMifEo46dCNXNKsNpPSgibdwHMulGnlqs91VM";
        
        let supabase = null;
        if (typeof Supabase !== 'undefined') {
            supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const audioBtn = document.getElementById('audio-btn');
        const tooltip = document.getElementById('star-tooltip');
        const modal = document.getElementById('payment-modal');
        const modalClose = document.getElementById('modal-close');
        const payBtn = document.getElementById('pay-btn');
        const tierBoxes = document.querySelectorAll('.tier-box');
        const ownerInput = document.getElementById('star-owner');
        const msgInput = document.getElementById('star-msg');
        // Search selectors
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const MERCHANT_WALLET = "DA56tToEYdJNfjma4sZ4wmQqec4KN1Dw4e";
        let selectedTier = "basic";
        let selectedPriceDoge = 7;
        let activeClickedStarNumber = null;
        // Target focus index for camera mechanics tracking
        let focusedStarIndex = 5;
        let targetXOffset = 0;
        let targetYOffset = 0;
        let currentXOffset = 0;
        let currentYOffset = 0;
        let focusedStarHovered = false;
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let cx = canvas.width / 2;
        let cy = canvas.height / 2;

        // 1. Инициализация звезд
        const numStars = 2000000;
        const stars = [];
        const rotateSpeed = 0.3;

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 3000,
                y: (Math.random() - 0.5) * 3000,
                z: Math.random() * 3000,
                phase: Math.random() * Math.PI * 2,
                flickerSpeed: 0.02 + Math.random() * 0.05,
                isBought: false,
                tier: 'basic',
                user_name: '',
                message: '',
                wallet_address: '',
                screenX: 0,
                screenY: 0,
                currentSize: 0
            });
        }

        // Позиционируем первые 11 звезд в пределах экрана в рандомном порядке при запуске
        const initPaddingX = canvas.width * 0.15;
        const initPaddingY = canvas.height * 0.15;
        for (let i = 0; i <= 10; i++) {
            const currentStar = stars[i];
            const sX = initPaddingX + Math.random() * (canvas.width - initPaddingX * 2);
            const sY = initPaddingY + Math.random() * (canvas.height - initPaddingY * 2);
            currentStar.x = (sX - cx) * (currentStar.z + 1) / 800;
            currentStar.y = (sY - cy) * (currentStar.z + 1) / 800;
        }

        async function loadPurchasedStars() {
            if (!supabase) return;
            try {
                const { data, error } = await supabase.from('purchased_stars').select('star_number, user_name, wallet_address, tier, message');
                if (!error && data) {
                    data.forEach(row => {
                        const idx = row.star_number;
                        if (idx !== null && idx < numStars) {
                            stars[idx].isBought = true;
                            stars[idx].user_name = row.user_name;
                            stars[idx].wallet_address = row.wallet_address;
                            stars[idx].tier = row.tier || 'basic';
                            stars[idx].message = row.message || 'To the moon! 🚀';
                        }
                    });
                }
            } catch (err) {
                console.error("Supabase data mapping failed:", err);
            }
        }
        loadPurchasedStars();
        // 2. Частицы
        const numParticles = 100;
        const particles = [];
        const flySpeed = 5;
        for (let i = 0; i < numParticles; i++) {
            particles.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000 });
        }

        // --- AUDIO ENGINE ---
        let audioCtx = null;
        let isPlaying = false;
        function playTone(freq, duration, maxVolume) {
            if (!audioCtx || !isPlaying) return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            const now = audioCtx.currentTime; gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(maxVolume, now + duration * 0.4);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + duration);
        }
        audioBtn.addEventListener('click', () => {
            if (!isPlaying) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); isPlaying = true;
                const notes = [329.63, 440.00, 493.88, 659.25];
                setInterval(() => { if(isPlaying) playTone(notes[Math.floor(Math.random()*notes.length)], 8, 0.03) }, 6000);
                audioBtn.innerText = "MUTE AUDIO";
            } else { isPlaying = false; audioBtn.innerText = "ENABLE AMBIENT"; }
        });
        // --- INTERACTIVITY HOVER & CLICK & SEARCH ---
        let hoveredStar = null;
        let globalZOffset = 5000; const targetZOffset = 0; const flyInSpeed = 0.02;
        tierBoxes.forEach(box => {
            box.addEventListener('click', () => {
                tierBoxes.forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                selectedTier = box.getAttribute('data-tier');
                selectedPriceDoge = parseFloat(box.getAttribute('data-price'));
            });
        });

        // NEW: Search engine button handler mechanics
        searchBtn.addEventListener('click', () => {
            const idVal = parseInt(searchInput.value);
            if (isNaN(idVal) || idVal < 0 || idVal >= numStars) {
                alert("Please enter a valid Star ID from 0 to 1999999.");
                return;
            }

            const targetStar = stars[idVal];
            
            // Рассчитываем случайные экранные координаты в пределах видимой области (с безопасными отступами 15%)
            const paddingX = canvas.width * 0.15;
            const paddingY = canvas.height * 0.15;
            const randomScreenX = paddingX + Math.random() * (canvas.width - paddingX * 2);
            const randomScreenY = paddingY + Math.random() * (canvas.height - paddingY * 2);

            // Меняем физическое положение выбранной звезды и 5 соседей в обе стороны,
            // чтобы они расположились в пределах экрана в рандомном порядке.
            const startId = Math.max(0, idVal - 5);
            const endId = Math.min(numStars - 1, idVal + 5);
            
            for (let i = startId; i <= endId; i++) {
                const currentStar = stars[i];
                let sX, sY;
                if (i === idVal) {
                    sX = randomScreenX;
                    sY = randomScreenY;
                } else {
                    sX = paddingX + Math.random() * (canvas.width - paddingX * 2);
                    sY = paddingY + Math.random() * (canvas.height - paddingY * 2);
                }
                
                currentStar.x = (sX - cx) * (currentStar.z + 1) / 800;
                currentStar.y = (sY - cy) * (currentStar.z + 1) / 800;
            }
            
            focusedStarIndex = idVal;
            targetXOffset = 0;
            targetYOffset = 0;
            if (targetStar.isBought) {
                // Если звезда куплена, принудительно открываем тултип рядом с ней
                setTimeout(() => {
                    tooltip.style.display = 'block';
                    tooltip.className = targetStar.tier;
                    
                    let label = targetStar.tier === 'supernova' ? '⚡ Supernova Core' : (targetStar.tier === 'constellation' ? '🌌 Constellation' : '⭐ Basic Star');
                    tooltip.innerHTML = `
                        <div class="tooltip-type" style="color:#ffd700; font-weight:bold;">📍 FOUND STAR #${idVal}</div>
                        <div class="tooltip-type" style="margin-top:5px;">${label}</div>
                        <div class="tooltip-title">${targetStar.user_name || 'Anonymous Buyer'}</div>
                        <div style="font-style:italic; opacity:0.9; margin: 4px 0;">"${targetStar.message}"</div>
                        <div style="font-size:11px; color:#ffd700; margin: 4px 0;">Coords: X:${Math.round(targetStar.x)} Y:${Math.round(targetStar.y)} Z:${Math.round(targetStar.z)}</div>
                        <div class="tooltip-meta">Wallet: ${targetStar.wallet_address ? targetStar.wallet_address.substring(0,6)+'...'+targetStar.wallet_address.substring(targetStar.wallet_address.length-4) : 'Unknown'}</div>
                    `;
                    // Проверка выхода за пределы экрана
                    let left = randomScreenX + 20;
                    let top = randomScreenY - 20;

                    if (left + tooltip.offsetWidth > window.innerWidth) {
                        left = randomScreenX - tooltip.offsetWidth - 20;
                    }
                    if (top + tooltip.offsetHeight > window.innerHeight) {
                        top = window.innerHeight - tooltip.offsetHeight - 20;
                    }
                    if (left < 10) left = 10;
                    if (top < 10) top = 10;

                    tooltip.style.left = `${left}px`;
                    tooltip.style.top = `${top}px`;
                }, 400);
            } else {
                // Если свободна — убираем тултип и предлагаем купить её
                tooltip.style.display = 'none';
                if (confirm(`Star #${idVal} [X:${Math.round(targetStar.x)}, Y:${Math.round(targetStar.y)}, Z:${Math.round(targetStar.z)}] is FREE! Would you like to buy it right now?`)) {
                    activeClickedStarNumber = idVal;
                    document.getElementById('modal-title').innerText = `Claim Star #${idVal} (${Math.round(targetStar.x)}, ${Math.round(targetStar.y)})`;
                    modal.style.display = 'block';
                    setTimeout(() => modal.classList.add('active'), 10);
                }
            }
        });
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            let foundStar = null;
            let foundStarIdx = null;
            focusedStarHovered = false;

            if (focusedStarIndex !== null) {
                const focusedStar = stars[focusedStarIndex];
                const dxFocus = mouseX - focusedStar.screenX;
                const dyFocus = mouseY - focusedStar.screenY;
                const focusRadius = Math.max(focusedStar.currentSize * 8, 25);

                if (dxFocus * dxFocus + dyFocus * dyFocus < focusRadius * focusRadius) {
                    focusedStarHovered = true;
                    canvas.style.cursor = 'pointer';
                }
            }

            let activeFocus = focusedStarIndex !== null ? focusedStarIndex : 5;
            let startRange = Math.max(0, activeFocus - 5);
            let endRange = Math.min(numStars - 1, activeFocus + 5);
            for (let i = startRange; i <= endRange; i++) {
                const star = stars[i];
                if (!star.isBought) continue;
                const dx = mouseX - star.screenX; const dy = mouseY - star.screenY;
                const hitRadius = Math.max(star.currentSize * 3, 10);
                if (dx * dx + dy * dy < hitRadius * hitRadius) { foundStar = star; foundStarIdx = i; break; }
            }

            if (foundStar) {
                hoveredStar = foundStar;
                tooltip.style.display = 'block';
                tooltip.className = foundStar.tier;
                
                let label = foundStar.tier === 'supernova' ? '⚡ Supernova Core' : (foundStar.tier === 'constellation' ? '🌌 Constellation' : '⭐ Basic Star');
                tooltip.innerHTML = `
                    <div class="tooltip-type" style="color:#ffd700; font-weight:bold;">📍 STAR #${foundStarIdx}</div>
                    <div class="tooltip-type">${label}</div>
                    <div class="tooltip-title">${foundStar.user_name || 'Anonymous Buyer'}</div>
                    <div style="font-style:italic; opacity:0.9; margin: 4px 0;">"${foundStar.message}"</div>
                    <div style="font-size:11px; color:#ffd700; margin: 4px 0;">Coords: X:${Math.round(foundStar.x)} Y:${Math.round(foundStar.y)} Z:${Math.round(foundStar.z)}</div>
                    <div class="tooltip-meta">Wallet: ${foundStar.wallet_address ? foundStar.wallet_address.substring(0,6)+'...'+foundStar.wallet_address.substring(foundStar.wallet_address.length-4) : 'Unknown'}</div>
                `;
                // Проверка выхода за пределы экрана
                let left = e.clientX + 15;
                let top = e.clientY + 15;

                if (left + tooltip.offsetWidth > window.innerWidth) {
                    left = e.clientX - tooltip.offsetWidth - 15;
                }
                if (top + tooltip.offsetHeight > window.innerHeight) {
                    top = e.clientY - tooltip.offsetHeight - 15;
                }
                if (left < 10) left = 10;
                if (top < 10) top = 10;

                tooltip.style.left = `${left}px`;
                tooltip.style.top = `${top}px`;
                if (!focusedStarHovered) {
                    canvas.style.cursor = 'crosshair';
                }
            } else { 
                hoveredStar = null;
                if (!focusedStarHovered) {
                    tooltip.style.display = 'none'; 
                }
            }
        });
        canvas.addEventListener('click', (e) => {
            if (hoveredStar) return;
            tooltip.style.display = 'none';

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            let closestStarIdx = 0;
            let minDist = Infinity;

            let activeFocusClick = focusedStarIndex !== null ? focusedStarIndex : 5;
            let startRangeClick = Math.max(0, activeFocusClick - 5);
            let endRangeClick = Math.min(numStars - 1, activeFocusClick + 5);
            for (let i = startRangeClick; i <= endRangeClick; i++) {
                if (stars[i].isBought) continue;
                const dx = mouseX - stars[i].screenX;
                const dy = mouseY - stars[i].screenY;
                const dist = dx*dx + dy*dy;
                if (dist < minDist) { minDist = dist; closestStarIdx = i; }
            }

            focusedStarIndex = closestStarIdx;
            activeClickedStarNumber = closestStarIdx;
            const cStar = stars[closestStarIdx];
            document.getElementById('modal-title').innerText = `Claim Star #${closestStarIdx} (${Math.round(cStar.x)}, ${Math.round(cStar.y)})`;
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        });
        // --- ОТПРАВКА ДАННЫХ В SUPABASE ---
        payBtn.addEventListener('click', async () => {
            const userNameVal = ownerInput.value.trim() || "Anonymous";
            const msgVal = msgInput.value.trim() || "To the moon! 🚀";
            let userWalletAddress = "0xManualDogeTransferPayment";

            payBtn.disabled = true;
            payBtn.innerText = "Connecting Wallet...";

            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    if (accounts && accounts[0]) { userWalletAddress = accounts[0]; }
                    await window.ethereum.request({
                        method: 'eth_sendTransaction',
                        params: [{ to: MERCHANT_WALLET, from: accounts, value: '0x0' }],
                    });
                } catch (e) { console.log("Wallet link bypassed."); }
            }

            payBtn.innerText = "Saving to Space Grid...";
            try {
                if (supabase) {
                    await supabase.from('purchased_stars').insert([
                        { star_number: activeClickedStarNumber, user_name: userNameVal, wallet_address: userWalletAddress, tier: selectedTier, message: msgVal }
                    ]);
                }
            } catch (err) { console.error("Database sync issue:", err.message); }

            stars[activeClickedStarNumber].isBought = true;
            stars[activeClickedStarNumber].user_name = userNameVal;
            stars[activeClickedStarNumber].wallet_address = userWalletAddress;
            stars[activeClickedStarNumber].tier = selectedTier;
            stars[activeClickedStarNumber].message = msgVal;

            alert(`Success! Star #${activeClickedStarNumber} is registered.`);
            
            ownerInput.value = ""; msgInput.value = "";
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
            payBtn.disabled = false;
            payBtn.innerText = "Proceed to Web3 Payment";
        });
        // 3. Render Pipeline Loop
        let startTime = Date.now();
        function animate() {
            ctx.fillStyle = '#000002';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const time = (Date.now() - startTime) * 0.001;
            if (globalZOffset > targetZOffset) globalZOffset -= (globalZOffset - targetZOffset) * flyInSpeed;
            // Плавная интерполяция смещения камеры к выбранной звезде
            if (focusedStarIndex !== null) {
                currentXOffset += (targetXOffset - currentXOffset) * 0.08;
                currentYOffset += (targetYOffset - currentYOffset) * 0.08;
            } else {
                currentXOffset += (0 - currentXOffset) * 0.02;
                currentYOffset += (0 - currentYOffset) * 0.02;
            }

            let activeFocusAnimate = focusedStarIndex !== null ? focusedStarIndex : 5;
            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                // Рендерим строго 11 звезд (выбранную и по 5 соседей в обе стороны по порядку)
                if (i < activeFocusAnimate - 5 || i > activeFocusAnimate + 5) continue;
                // STATIC STARS
               // вращение отключено — звезды остаются неподвижными

                // Применяем текущие смещения камеры (currentXOffset / currentYOffset) к проекции
                const factor = 800 / (star.z + globalZOffset + 1);
                star.screenX = cx + (star.x + currentXOffset) * factor; 
                star.screenY = cy + (star.y + currentYOffset) * factor;
                if (star.screenX >= 0 && star.screenX <= canvas.width && star.screenY >= 0 && star.screenY <= canvas.height) {
                    star.phase += star.flickerSpeed;
                    const brightness = 0.4 + Math.sin(star.phase) * 0.6;
                    const baseSize = (1 - (star.z + globalZOffset) / 8000) * 2.2;
                    let size = Math.max(0.4, baseSize * (0.7 + brightness * 0.3));
                    let starColor = `rgba(255, 235, 120, ${brightness})`;
                    let auraColor = `rgba(255, 215, 0, ${brightness * 0.15})`;

                    if (star.isBought) {
                        if (star.tier === 'basic') { size *= 2.0; starColor = `rgba(255, 235, 120, 1)`; } 
                        else if (star.tier === 'supernova') {
                            const pulse = 1.2 + Math.sin(time * 6) * 0.4;
                            size *= 2.8 * pulse; starColor = `rgba(255, 51, 102, 1)`; auraColor = `rgba(255, 51, 102, 0.35)`;
                        } else if (star.tier === 'constellation') {
                            size *= 3.8; starColor = `rgba(0, 255, 255, 1)`; auraColor = `rgba(0, 255, 255, 0.4)`;
                        }
                    }

                    star.currentSize = size;
                    if (focusedStarIndex === i && focusedStarHovered) {
                        const hoverPulse = 2.4 + Math.sin(time * 10) * 0.3;
                        size *= hoverPulse;
                    }

                    // NEW: Рисуем яркий прицел вокруг сфокусированной через поиск звезды
                    if (focusedStarIndex === i) {
                        ctx.beginPath();
                        ctx.arc(star.screenX, star.screenY, size * 6 + Math.sin(time * 8) * 4, 0, Math.PI * 2);
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }

                    if (focusedStarIndex === i && focusedStarHovered) {
                        auraColor = `rgba(255, 215, 0, 0.9)`;
                    }
                    ctx.beginPath();
                    ctx.arc(star.screenX, star.screenY, size * 2.8, 0, Math.PI * 2);
                    ctx.fillStyle = auraColor; ctx.fill();
                    ctx.beginPath();
                    ctx.arc(star.screenX, star.screenY, size, 0, Math.PI * 2);
                    ctx.fillStyle = starColor; ctx.fill();
                }
            }

            // Летящие частицы
            if (globalZOffset < 500) {
                for (let i = 0; i < numParticles; i++) {
                    const p = particles[i];
                    p.z -= flySpeed;
                    if (p.z <= 0) { p.z = 2000; p.x = (Math.random() - 0.5) * 2000; p.y = (Math.random() - 0.5) * 2000; }
                    const pFactor = 800 / (p.z + 1);
                    const pScreenX = cx + p.x * pFactor; const pScreenY = cy + p.y * pFactor;
                    if (pScreenX >= 0 && pScreenX <= canvas.width && pScreenY >= 0 && pScreenY <= canvas.height) {
                        const pSize = (1 - p.z / 2000) * 4.5;
                        const alpha = (1 - p.z / 2000) * 0.6;
                        ctx.beginPath(); ctx.moveTo(pScreenX, pScreenY);
                        ctx.lineTo(cx + p.x * (800 / (p.z + flySpeed * 2.5 + 1)), cy + p.y * (800 / (p.z + flySpeed * 2.5 + 1)));
                        ctx.strokeStyle = `rgba(255, 220, 160, ${alpha})`; ctx.lineWidth = pSize * 0.4; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
