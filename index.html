<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE Starfield Space — Buy Your Own Star</title>
    <!-- Подключаем стабильную библиотеку Supabase -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010105;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        .controls-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .ui-btn {
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .ui-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* Hover Tooltip Card */
        #star-tooltip {
            position: absolute;
            padding: 15px;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid #ffd700;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            min-width: 220px;
        }
        #star-tooltip.supernova { border-color: #ff3366; box-shadow: 0 0 25px rgba(255, 51, 102, 0.3); }
        #star-tooltip.constellation { border-color: #00ffff; box-shadow: 0 0 25px rgba(0, 255, 255, 0.3); }
        
        .tooltip-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #ffd700; }
        #star-tooltip.supernova .tooltip-title { color: #ff3366; }
        #star-tooltip.constellation .tooltip-title { color: #00ffff; }
        .tooltip-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.7; }
        .tooltip-meta { color: #888; font-size: 10px; margin-top: 8px; word-break: break-all; }

        /* Neon Payment Modal */
        #payment-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(7, 7, 20, 0.95);
            border: 1px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
            border-radius: 20px;
            padding: 25px;
            width: 360px;
            text-align: center;
            backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #payment-modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            color: #aaa;
            font-size: 20px;
        }

        .tier-box {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
            text-align: left;
        }
        .tier-box.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

            
            ownerInput.value = "";
            msgInput.value = "";
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
            payBtn.disabled = false;
            payBtn.innerText = "Proceed to Web3 Payment";
        });

        // 3. Render Pipeline Loop
        let startTime = Date.now();
        function animate() {
            ctx.fillStyle = '#000002'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const time = (Date.now() - startTime) * 0.001;

            if (globalZOffset > targetZOffset) globalZOffset -= (globalZOffset - targetZOffset) * flyInSpeed;

            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                const rad = rotateSpeed * 0.005; const cos = Math.cos(rad); const sin = Math.sin(rad);
                const x1 = star.x * cos - star.y * sin; const y1 = star.y * cos + star.x * sin;
                star.x = x1; star.y = y1;

                const factor = 800 / (star.z + globalZOffset + 1);
                star.screenX = cx + star.x * factor; star.screenY = cy + star.y * factor;

                if (star.screenX >= 0 && star.screenX <= canvas.width && star.screenY >= 0 && star.screenY <= canvas.height) {
                    star.phase += star.flickerSpeed;
                    const brightness = 0.4 + Math.sin(star.phase) * 0.6;
                    const baseSize = (1 - (star.z + globalZOffset) / 8000) * 2.2;
                    
                    let size = Math.max(0.4, baseSize * (0.7 + brightness * 0.3));
                    let starColor = `rgba(255, 235, 120, ${brightness})`;
                    let auraColor = `rgba(255, 215, 0, ${brightness * 0.15})`;

                    if (star.isBought) {
                        if (star.tier === 'basic') { size *= 2.0; starColor = `rgba(255, 235, 120, 1)`; } 
                        else if (star.tier === 'supernova') {
                            const pulse = 1.2 + Math.sin(time * 6) * 0.4;
                            size *= 2.8 * pulse; starColor = `rgba(255, 51, 102, 1)`; auraColor = `rgba(255, 51, 102, 0.35)`;
                        } else if (star.tier === 'constellation') {
                            size *= 3.8; starColor = `rgba(0, 255, 255, 1)`; auraColor = `rgba(0, 255, 255, 0.4)`;
                        }
                    }

                    star.currentSize = size;

                    ctx.beginPath(); ctx.arc(star.screenX, star.screenY, size * 2.8, 0, Math.PI * 2);
                    ctx.fillStyle = auraColor; ctx.fill();
                    ctx.beginPath(); ctx.arc(star.screenX, star.screenY, size, 0, Math.PI * 2);
                    ctx.fillStyle = starColor; ctx.fill();
                }
            }

            if (globalZOffset < 500) {
                for (let i = 0; i < numParticles; i++) {
                    const p = particles[i]; p.z -= flySpeed;
                    if (p.z <= 0) { p.z = 2000; p.x = (Math.random() - 0.5) * 2000; p.y = (Math.random() - 0.5) * 2000; }
                    const pFactor = 800 / (p.z + 1);
                    const pScreenX = cx + p.x * pFactor; const pScreenY = cy + p.y * pFactor;
                    if (pScreenX >= 0 && pScreenX <= canvas.width && pScreenY >= 0 && pScreenY <= canvas.height) {
                        const pSize = (1 - p.z / 2000) * 4.5; const alpha = (1 - p.z / 2000) * 0.6;
                        ctx.beginPath(); ctx.moveTo(pScreenX, pScreenY);
                        ctx.lineTo(cx + p.x * (800 / (p.z + flySpeed * 2.5 + 1)), cy + p.y * (800 / (p.z + flySpeed * 2.5 + 1)));
                        ctx.strokeStyle = `rgba(255, 220, 160, ${alpha})`; ctx.lineWidth = pSize * 0.4; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
