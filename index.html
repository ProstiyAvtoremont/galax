<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Звездное Небо</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
        }
        canvas {
            display: block;
        }
    </style>
    <!-- Подключаем Three.js через CDN -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <script>
        // 1. Инициализация сцены, камеры и рендерера
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Помещаем камеру в центр сцены
        camera.position.z = 1;

        // 2. Создание геометрии для 5000 звезд
        const starsCount = 5000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(starsCount * 3);
        const randomSpeeds = new Float32Array(starsCount); // Индивидуальная скорость мерцания

        for (let i = 0; i < starsCount * 3; i += 3) {
            // Распределяем звезды в сфере вокруг центра
            const radius = 500;
            const u = Math.random();
            const v = Math.random();
            const theta = u * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * v - 1.0);
            
            positions[i] = radius * Math.sin(phi) * Math.cos(theta);     // X
            positions[i + 1] = radius * Math.sin(phi) * Math.sin(theta); // Y
            positions[i + 2] = radius * Math.cos(phi);                   // Z

            // Случайный коэффициент для скорости мерцания каждой звезды
            randomSpeeds[i / 3] = 0.5 + Math.random() * 2.5;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // 3. Создание материала с кастомным шейдером для яркого желтого свечения и мерцания
        const material = new THREE.ShaderMaterial({
            uniforms: {
                time: { value: 0 },
                color: { value: new THREE.Color(0xFFD700) } // Яркий золотисто-желтый цвет
            },
            vertexShader: `
                uniform float time;
                attribute float speed;
                void main() {
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    // Размер точки зависит от расстояния до камеры
                    gl_PointSize = (12.0 / -mvPosition.z); 
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 color;
                uniform float time;
                void main() {
                    // Создаем эффект мягкого круглого свечения вместо квадратных точек
                    float distanceToCenter = length(gl_PointCoord - vec2(0.5));
                    if (distanceToCenter > 0.5) discard;
                    
                    // Формула мягкого затухания к краям звезды
                    float strength = 1.0 - (distanceToCenter * 2.0);
                    strength = pow(strength, 1.5);

                    // Эффект мерцания (динамическая яркость)
                    // Используем координаты пикселя для уникального шума мерцания
                    float flicker = sin(time * 4.0 + gl_FragCoord.x * 0.05 + gl_FragCoord.y * 0.05) * 0.4 + 0.6;

                    gl_FragColor = vec4(color * strength * flicker, strength);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending, // Свечение усиливается при наложении точек
            depthWrite: false
        });

        // Создаем систему частиц (облако звезд)
        const starField = new THREE.Points(geometry, material);
        scene.add(starField);

        // 4. Анимация
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            material.uniforms.time.value = elapsedTime;

            // Медленное вращение всего звездного неба для эффекта присутствия
            starField.rotation.y = elapsedTime * 0.02;
            starField.rotation.x = elapsedTime * 0.01;

            renderer.render(scene, camera);
        }

        animate();

        // 5. Адаптивность под размеры экрана
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
