<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Звездное Небо</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020208; /* Глубокий космический цвет */
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>

    <!-- Используем стандартный HTML5 холст, который работает везде -->
    <canvas id="starfield"></canvas>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        // Настройка размеров экрана
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Параметры системы
        const numStars = 5000;
        const stars = [];
        const speed = 0.5; // Скорость вращения неба

        // Центр экрана (вокруг него будет вращение)
        let cx = canvas.width / 2;
        let cy = canvas.height / 2;

        window.addEventListener('resize', () => {
            cx = canvas.width / 2;
            cy = canvas.height / 2;
        });

        // 1. Инициализация 5000 звезд с 3D-координатами
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 3000, // Глубина X
                y: (Math.random() - 0.5) * 3000, // Глубина Y
                z: Math.random() * 3000,         // Дистанция Z (расстояние до экрана)
                phase: Math.random() * Math.PI * 2, // Индивидуальная фаза мерцания
                flickerSpeed: 0.02 + Math.random() * 0.05 // Скорость мерцания
            });
        }

        // 2. Главный цикл анимации
        function animate() {
            // Очищаем экран черным цветом на каждом кадре
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Отрисовка каждой звезды
            for (let i = 0; i < numStars; i++) {
                const star = stars[i];

                // Имитация 3D вращения звезд вокруг центра
                // Математически смещаем X и Y по тригонометрическому кругу
                const rad = speed * 0.005;
                const cos = Math.cos(rad);
                const sin = Math.sin(rad);
                
                const x1 = star.x * cos - star.y * sin;
                const y1 = star.y * cos + star.x * sin;
                star.x = x1;
                star.y = y1;

                // Перевод 3D координат в 2D пиксели на экране (Перспектива)
                // Чем ближе звезда (меньше Z), тем сильнее она разлетается к краям
                const factor = 800 / (star.z + 1);
                const screenX = cx + star.x * factor;
                const screenY = cy + star.y * factor;

                // Проверяем, попадает ли звезда в видимую область экрана
                if (screenX >= 0 && screenX <= canvas.width && screenY >= 0 && screenY <= canvas.height) {
                    
                    // Рассчитываем мерцание через синусоиду
                    star.phase += star.flickerSpeed;
                    const brightness = 0.4 + Math.sin(star.phase) * 0.6; // Значение от 0.0 до 1.0

                    // Базовый размер зависит от удаленности (Z-индекса)
                    const baseSize = (1 - star.z / 3000) * 2.5;
                    const size = Math.max(0.5, baseSize * (0.7 + brightness * 0.3));

                    // Рисуем мягкое желтое свечение вокруг звезды
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, size * 2.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 215, 0, ${brightness * 0.15})`; // Полупрозрачный ореол
                    ctx.fill();

                    // Рисуем яркое желтое ядро звезды
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 235, 120, ${brightness})`; // Яркий центр
                    ctx.fill();
                }
            }

            requestAnimationFrame(animate);
        }

        // Запуск
        animate();
    </script>
</body>
</html>
