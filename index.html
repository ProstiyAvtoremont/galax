<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE Starfield Space — Buy Your Own Star</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010105;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        .controls-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .ui-btn {
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .ui-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
            transform: translateY(-2px);
        }

        #star-tooltip {
            position: absolute;
            padding: 15px;
            background: rgba(5, 5, 15, 0.85);
            border: 1px solid #ffd700;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            min-width: 200px;
        }

        #payment-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(7, 7, 20, 0.95);
            border: 1px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
            border-radius: 20px;
            padding: 30px;
            width: 360px;
            text-align: center;
            backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #payment-modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            color: #aaa;
            font-size: 20px;
        }
        .modal-close:hover { color: #fff; }
        
        .tier-box {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 12px;
            margin: 12px 0;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
            text-align: left;
        }
        .tier-box.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.15);
        }
        .pay-btn {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            margin-top: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            transition: all 0.2s;
        }
        .pay-btn:disabled {
            background: #555;
            color: #888;
            box-shadow: none;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>
    
    <div class="controls-container">
        <button class="ui-btn" id="audio-btn">ENABLE AMBIENT</button>
    </div>

    <div id="star-tooltip"></div>

    <!-- Payment Modal -->
    <div id="payment-modal">
        <span class="modal-close" id="modal-close">&times;</span>
        <h2 style="color: #ffd700; margin-top: 0;">Claim This Star</h2>
        <p style="font-size: 13px; opacity: 0.8; margin-bottom: 20px;">Immortalize yourself on the starfield map using DOGE.</p>
        
        <!-- Добавили data-price (в DOGE, примерные значения для теста) -->
        <div class="tier-box selected" data-tier="basic" data-price="7">
            <div style="font-weight:bold; color:#ffd700;">⭐ Basic Star</div>
            <div style="font-size:11px; opacity:0.7; margin-top:3px;">Your Name + Text (~7 DOGE / $1)</div>
        </div>
        <div class="tier-box" data-tier="supernova" data-price="28">
            <div style="font-weight:bold; color:#ff3366;">✨ Supernova</div>
            <div style="font-size:11px; opacity:0.7; margin-top:3px;">Larger size, pulsing color, link (~28 DOGE / $4)</div>
        </div>
        <div class="tier-box" data-tier="constellation" data-price="250">
            <div style="font-weight:bold; color:#00ffff;">🌌 Constellation</div>
            <div style="font-size:11px; opacity:0.7; margin-top:3px;">B2B Group branding / Custom logo shape (~250 DOGE / $35)</div>
        </div>

        <button class="pay-btn" id="pay-btn">Proceed to Web3 Payment</button>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const audioBtn = document.getElementById('audio-btn');
        const tooltip = document.getElementById('star-tooltip');
        const modal = document.getElementById('payment-modal');
        const modalClose = document.getElementById('modal-close');
        const payBtn = document.getElementById('pay-btn');
        const tierBoxes = document.querySelectorAll('.tier-box');

        // Конфигурация вашего кошелька
        const MERCHANT_WALLET = "DA56tToEYdJNfjma4sZ4wmQqec4KN1Dw4e";
        let selectedPriceDoge = 7; // Дефолтная цена за Basic Star

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let cx = canvas.width / 2;
        let cy = canvas.height / 2;

        window.addEventListener('resize', () => {
            cx = canvas.width / 2;
            cy = canvas.height / 2;
        });

        // CAMERA SYSTEMS: Smooth Init Fly-in Flight Effect
        let globalZOffset = 5000;
        const targetZOffset = 0;
        const flyInSpeed = 0.02;

        // 1. Core Stars Array (5000 Stars)
        const numStars = 5000;
        const stars = [];
        const rotateSpeed = 0.3;

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 3000,
                y: (Math.random() - 0.5) * 3000,
                z: Math.random() * 3000,
                phase: Math.random() * Math.PI * 2,
                flickerSpeed: 0.02 + Math.random() * 0.05,
                isBought: false,
                screenX: 0,
                screenY: 0,
                currentSize: 0
            });
        }

        // 2. Flying Cosmic Particles (100 Particles)
        const numParticles = 100;
        const particles = [];
        const flySpeed = 5;

        for (let i = 0; i < numParticles; i++) {
            particles.push({
                x: (Math.random() - 0.5) * 2000,
                y: (Math.random() - 0.5) * 2000,
                z: Math.random() * 2000
            });
        }

        // --- CRYSTAL CLEAR MEDITATIVE AMBIENT ---
        let audioCtx = null;
        let isPlaying = false;
        let ambientInterval = null;

        function playTone(freq, duration, maxVolume) {
            if (!audioCtx || !isPlaying) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            const now = audioCtx.currentTime;
            gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(maxVolume, now + duration * 0.4);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + duration);
        }

        function startAmbient() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isPlaying = true;
            const notes = [329.63, 440.00, 493.88, 587.33, 659.25];
            function triggerWave() {
                if (!isPlaying) return;
                const note1 = notes[Math.floor(Math.random() * notes.length)];
                playTone(note1, 7 + Math.random() * 3, 0.03);
            }
            triggerWave();
            ambientInterval = setInterval(triggerWave, 6000);
        }

        function stopAmbient() {
            isPlaying = false;
            clearInterval(ambientInterval);
            if (audioCtx) { setTimeout(() => { audioCtx.close(); }, 1000); }
        }

        audioBtn.addEventListener('click', () => {
            if (!isPlaying) {
                startAmbient();
                audioBtn.innerText = "MUTE AUDIO";
                audioBtn.style.borderColor = "rgba(255, 100, 100, 0.5)";
                audioBtn.style.color = "#ff6464";
            } else {
                stopAmbient();
                audioBtn.innerText = "ENABLE AMBIENT";
                audioBtn.style.borderColor = "rgba(255, 215, 0, 0.5)";
                audioBtn.style.color = "#ffd700";
            }
        });

        // --- INTERACTIVITY LOGIC ---
        
        // Переключение тарифов в окне оплаты
        tierBoxes.forEach(box => {
            box.addEventListener('click', () => {
                tierBoxes.forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                selectedPriceDoge = parseFloat(box.getAttribute('data-price'));
            });
        });

        canvas.addEventListener('click', (e) => {
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        });

        // --- WEB3 ИНТЕГРАЦИЯ ДЛЯ КЛИКА ПО КНОПКЕ ОПЛАТЫ ---
        payBtn.addEventListener('click', async () => {
            // 1. Проверяем, установлен ли криптокошелек у пользователя (например, MetaMask)
            if (typeof window.ethereum !== 'undefined') {
                try {
                    payBtn.disabled = true;
                    payBtn.innerText = "Connecting Wallet...";

                    // 2. Запрашиваем доступ к аккаунту
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const userWallet = accounts[0];

                    payBtn.innerText = "Processing Transaction...";

                    // 3. Формируем транзакцию. 
                    // Поскольку Dogecoin кошельки используют нативный блокчейн, для вызова через Web3 
                    // пользователи отправляют Dogecoin в его смарт-контрактной обертке (wDOGE) или 
                    // сайт запрашивает прямую нативную транзакцию через Doge-расширения.
                    // Ниже представлен универсальный системный вызов транзакции:
                    const transactionParameters = {
                        to: MERCHANT_WALLET, // Адрес вашего кошелька
                        from: userWallet,
                        value: '0x0', // Сумма в hex-формате сети
                        data: '0x'    // Дополнительный блок данных для Web3-ноды
                    };

                    // Отправляем запрос на подпись транзакции в кошелек пользователя
                    const txHash = await window.ethereum.request({
                        method: 'eth_sendTransaction',
                        params: [transactionParameters],
                    });

                    alert(`Success! Tx Hash: ${txHash}\nYour star is processing.`);
                    modal.classList.remove('active');
                    setTimeout(() => modal.style.display = 'none', 300);

                } catch (error) {
                    console.error(error);
                    alert("Transaction cancelled or failed.");
                } finally {
                    payBtn.disabled = false;
                    payBtn.innerText = "Proceed to Web3 Payment";
                }
            } else {
                // Если кошелька нет, показываем прямые реквизиты для копирования вручную
                alert(`Web3 wallet not detected.\n\nPlease send ${selectedPriceDoge} DOGE manually to our address:\n${MERCHANT_WALLET}`);
            }
        });

        // 3. Render Engine Pipeline Animation Loop
        function animate() {
            ctx.fillStyle = '#000002';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (globalZOffset > targetZOffset) {
                globalZOffset -= (globalZOffset - targetZOffset) * flyInSpeed;
            }

            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                
                const rad = rotateSpeed * 0.005;
                const cos = Math.cos(rad);
                const sin = Math.sin(rad);
                const x1 = star.x * cos - star.y * sin;
                const y1 = star.y * cos + star.x * sin;
                star.x = x1;
                star.y = y1;

                const factor = 800 / (star.z + globalZOffset + 1);
                star.screenX = cx + star.x * factor;
                star.screenY = cy + star.y * factor;

                if (star.screenX >= 0 && star.screenX <= canvas.width && star.screenY >= 0 && star.screenY <= canvas.height) {
                    star.phase += star.flickerSpeed;
                    const brightness = 0.4 + Math.sin(star.phase) * 0.6;
                    const baseSize = (1 - (star.z + globalZOffset) / 8000) * 2.2;
                    
                    let size = Math.max(0.4, baseSize * (0.7 + brightness * 0.3));
                    let starColor = `rgba(255, 235, 120, ${brightness})`;
                    let auraColor = `rgba(255, 215, 0, ${brightness * 0.15})`;

                    star.currentSize = size; 

                    ctx.beginPath();
                    ctx.arc(star.screenX, star.screenY, size * 2.8, 0, Math.PI * 2);
                    ctx.fillStyle = auraColor;
                    ctx.fill();

                    ctx.beginPath();
                    ctx.arc(star.screenX, star.screenY, size, 0, Math.PI * 2);
                    ctx.fillStyle = starColor;
                    ctx.fill();
                }
            }

            if (globalZOffset < 500) {
                for (let i = 0; i < numParticles; i++) {
                    const p = particles[i];
                    p.z -= flySpeed;

                    if (p.z <= 0) {
                        p.z = 2000;
                        p.x = (Math.random() - 0.5) * 2000;
                        p.y = (Math.random() - 0.5) * 2000;
                    }

                    const pFactor = 800 / (p.z + 1);
                    const pScreenX = cx + p.x * pFactor;
                    const pScreenY = cy + p.y * pFactor;

                    if (pScreenX >= 0 && pScreenX <= canvas.width && pScreenY >= 0 && pScreenY <= canvas.height) {
                        const pSize = (1 - p.z / 2000) * 4.5; 
                        const alpha = (1 - p.z / 2000) * 0.6;

                        ctx.beginPath();
                        ctx.moveTo(pScreenX, pScreenY);
                        const tailX = cx + p.x * (800 / (p.z + flySpeed * 2.5 + 1));
                        const tailY = cy + p.y * (800 / (p.z + flySpeed * 2.5 + 1));
                        ctx.lineTo(tailX, tailY);
                        
                        ctx.strokeStyle = `rgba(255, 220, 160, ${alpha})`;
                        ctx.lineWidth = pSize * 0.4;
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.arc(pScreenX, pScreenY, pSize, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 230, ${alpha + 0.3})`;
                        ctx.fill();
                    }
                }
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
