<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Star Ownership Map</title>

<style>
body {
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
    color:white;
}

canvas {
    position:absolute;
    top:0;
    left:0;
}

#ui {
    position:absolute;
    top:20px;
    left:20px;
    z-index:10;
    display:flex;
    gap:10px;
}

input {
    padding:10px;
    border-radius:8px;
    border:none;
}

button {
    padding:10px 15px;
    background:gold;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

/* modal */
#modal {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#111;
    padding:20px;
    border:1px solid gold;
    display:none;
    width:320px;
}

.option {
    padding:10px;
    border:1px solid #333;
    margin:8px 0;
    cursor:pointer;
}

.option:hover {
    border-color:gold;
}
</style>
</head>

<body>

<div id="ui">
    <input id="search" placeholder="Star ID (0 - 2,000,000)" />
    <button onclick="searchStar()">Search</button>
</div>

<canvas id="c"></canvas>

<div id="modal">
    <h3 id="title">Buy Star</h3>

    <div class="option" onclick="selectTier('basic')">
        ⭐ Basic ($1 DOGE)
    </div>

    <div class="option" onclick="selectTier('supernova')">
        ✨ Supernova ($3-$5 DOGE)
    </div>

    <div class="option" onclick="selectTier('constellation')">
        🌌 Constellation ($20-$50 DOGE)
    </div>

    <button onclick="pay()">Pay (DOGE)</button>
</div>

<script>

/* =========================
   CANVAS INIT
========================= */

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}
addEventListener("resize", resize);
resize();

/* =========================
   BACKGROUND STARS
========================= */

const STAR_COUNT = 3000;
const stars = [];

for(let i=0;i<STAR_COUNT;i++){
    stars.push({
        x:(Math.random()-0.5)*3000,
        y:(Math.random()-0.5)*3000,
        z:Math.random()*2000,
        phase:Math.random()*Math.PI*2
    });
}

/* =========================
   VIRTUAL STAR SYSTEM
========================= */

const MAX_ID = 2000000;

function getStarPosition(id){
    const seed = id * 99991;

    return {
        x: Math.sin(seed) * 2400,
        y: Math.cos(seed) * 2400,
        z: (Math.sin(seed*2) * 1000) + 1500
    };
}

/* =========================
   CAMERA SYSTEM
========================= */

let camX = 0;
let camY = 0;
let targetX = 0;
let targetY = 0;

let focusedId = null;

/* =========================
   CAMERA SAFETY (NO BLACK SCREEN)
========================= */

function applyCameraSafety(){
    const limit = 7000;

    camX = Math.max(-limit, Math.min(limit, camX));
    camY = Math.max(-limit, Math.min(limit, camY));

    camX *= 0.9996;
    camY *= 0.9996;
}

/* =========================
   SEARCH
========================= */

function searchStar(){

    const id = parseInt(document.getElementById("search").value);

    if(isNaN(id) || id < 0 || id > MAX_ID){
        alert("Invalid Star ID");
        return;
    }

    const pos = getStarPosition(id);

    focusedId = id;

    targetX = -pos.x;
    targetY = -pos.y;

    document.getElementById("modal").style.display = "block";
    document.getElementById("title").innerText = "Star #" + id;
}

/* =========================
   TIER SELECT
========================= */

let selectedTier = "basic";

function selectTier(t){
    selectedTier = t;
}

/* =========================
   PAYMENT PLACEHOLDER
========================= */

function pay(){
    alert("DOGE payment sent (placeholder)");
    document.getElementById("modal").style.display = "none";
}

/* =========================
   ANIMATION LOOP
========================= */

function animate(){

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    /* smooth camera */
    camX += (targetX - camX) * 0.06;
    camY += (targetY - camY) * 0.06;

    applyCameraSafety();

    const cx = canvas.width/2;
    const cy = canvas.height/2;

    /* background stars */
    for(let s of stars){

        s.phase += 0.02;

        const brightness = 0.4 + Math.sin(s.phase)*0.6;

        const factor = 800/(s.z+1);

        const px = s.x + camX;
        const py = s.y + camY;

        const x = cx + px * factor;
        const y = cy + py * factor;

        if(x < -50 || x > canvas.width+50 || y < -50 || y > canvas.height+50)
            continue;

        ctx.fillStyle = `rgba(255,255,255,${brightness})`;
        ctx.fillRect(x,y,2,2);
    }

    /* highlight focused star */
    if(focusedId !== null){

        const p = getStarPosition(focusedId);

        const fx = cx + (p.x + camX);
        const fy = cy + (p.y + camY);

        ctx.beginPath();
        ctx.arc(fx,fy,30,0,Math.PI*2);
        ctx.strokeStyle = "gold";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(fx,fy,45 + Math.sin(Date.now()*0.01)*5,0,Math.PI*2);
        ctx.strokeStyle = "rgba(255,215,0,0.25)";
        ctx.stroke();
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
