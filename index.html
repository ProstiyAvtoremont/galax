<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Бесконечная Галактика</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
    <!-- Используем стабильную CDN-версию Three.js -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <canvas id="galaxy"></canvas>

    <script>
        // --- НАСТРОЙКИ ---
        const TOTAL_SECTIONS = 6;        // Количество секторов глубины
        const STARS_PER_SECTION = 10000; // Количество звезд на один сектор (всего 1 000 000)
        const STAR_SIZE = 0.08;          // Базовый размер звезд
        const FLIGHT_SPEED = 4.0;        // Скорость полета вперед

        // --- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ---
        const canvas = document.getElementById('galaxy');
        const scene = new THREE.Scene();
        
        // Камера с оптимальным углом обзора
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; 

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- СОЗДАНИЕ ГАЛАКТИКИ ---
        const totalStars = STARS_PER_SECTION * TOTAL_SECTIONS;
        
        // Маленькая сфера для каждой звезды
        const starGeometry = new THREE.SphereGeometry(STAR_SIZE, 4, 4);
        
        // Чистый стандартный материал без кастомных шейдеров — гарантия работы во всех браузерах
        const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        const starMesh = new THREE.InstancedMesh(starGeometry, starMaterial, totalStars);
        
        // Подготовка массивов для управления звездами
        const dummy = new THREE.Object3D();
        const initialPositions = [];
        const phases = new Float32Array(totalStars); // Фаза индивидуального мерцания
        const starColors = new Float32Array(totalStars * 3); // Массив для цветов (RGB)

        const sectionDepth = 25; 
        let starIndex = 0;

        // Генерация позиций звезд по секторам глубины
        for (let s = 0; s < TOTAL_SECTIONS; s++) {
            const zOffset = -s * sectionDepth; 

            for (let i = 0; i < STARS_PER_SECTION; i++) {
                // Распределяем по ширине (X), высоте (Y) и глубине (Z)
                const x = (Math.random() - 0.5) * 55; 
                const y = (Math.random() - 0.5) * 35;
                const z = zOffset + (Math.random() - 0.5) * sectionDepth; 

                dummy.position.set(x, y, z);
                dummy.scale.set(1, 1, 1);
                dummy.updateMatrix();
                
                starMesh.setMatrixAt(starIndex, dummy.matrix);
                initialPositions.push(new THREE.Vector3(x, y, z));
                
                // Случайная частота мерцания
                phases[starIndex] = 2.0 + Math.random() * 4.0;
                
                // По умолчанию все звезды белые (RGB: 1.0, 1.0, 1.0)
                starColors[starIndex * 3] = 1.0;
                starColors[starIndex * 3 + 1] = 1.0;
                starColors[starIndex * 3 + 2] = 1.0;

                starIndex++;
            }
        }

        // Привязываем массив цветов к нашей сетке звезд
        starMesh.instanceColor = new THREE.InstancedBufferAttribute(starColors, 3);
        scene.add(starMesh);

        // --- ИНТЕРАКТИВ (ЛУЧ НАВЕДЕНИЯ МЫШИ) ---
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 0.5; // Чувствительность попадания по звезде
        
        const mouse = new THREE.Vector2(-100, -100);
        let hoveredInstanceId = null;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('mouseleave', () => {
            mouse.set(-100, -100);
        });

        function updateHover() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(starMesh);

            if (intersects.length > 0) {
                const instanceId = intersects.instanceId;
                if (hoveredInstanceId !== instanceId) {
                    if (hoveredInstanceId !== null) resetStar(hoveredInstanceId);
                    hoveredInstanceId = instanceId;
                    highlightStar(instanceId);
                }
            } else {
                if (hoveredInstanceId !== null) {
                    resetStar(hoveredInstanceId);
                    hoveredInstanceId = null;
                }
            }
        }

        function highlightStar(id) {
            // Увеличиваем звезду в 10 раз
            dummy.position.copy(initialPositions[id]);
            dummy.scale.set(10, 10, 10);
            dummy.updateMatrix();
            starMesh.setMatrixAt(id, dummy.matrix);
            starMesh.instanceMatrix.needsUpdate = true;
        }

        function resetStar(id) {
            // Возвращаем звезде обычный масштаб
            dummy.position.copy(initialPositions[id]);
            dummy.scale.set(1, 1, 1);
            dummy.updateMatrix();
            starMesh.setMatrixAt(id, dummy.matrix);
            starMesh.instanceMatrix.needsUpdate = true;
        }

        // --- АНИМАЦИЯ ---
        const clock = new THREE.Clock();
        const totalDepth = TOTAL_SECTIONS * sectionDepth;
        const colorTarget = new THREE.Color();

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            // --- ЛОГИКА МЕРЦАНИЯ И ПОДСВЕТКИ ---
            const colorAttr = starMesh.instanceColor;
            
            for (let i = 0; i < totalStars; i++) {
                if (i === hoveredInstanceId) {
                    // Наведенная звезда горит стабильным ярко-желтым цветом
                    colorTarget.setHex(0xffd700);
                    colorAttr.setXYZ(i, colorTarget.r * 2.0, colorTarget.g * 2.0, colorTarget.b * 2.0);
                } else {
                    // Обычные звезды мерцают (яркость от 0.2 до 1.0)
                    const brightness = 0.2 + 0.8 * Math.abs(Math.sin(time * phases[i]));
                    colorAttr.setXYZ(i, brightness, brightness, brightness);
                }
            }
            colorAttr.needsUpdate = true;

            // Автоматический полет камеры вперед по оси Z
            camera.position.z -= FLIGHT_SPEED * delta;

            // Когда долетели до конца, плавно переносимся на старт
            if (camera.position.z < -totalDepth) {
                camera.position.z = 5;
            }

            updateHover();
            renderer.render(scene, camera);
        }

        // --- АДАПТИВНОСТЬ ПОД РАЗРЕШЕНИЕ ЭКРАНА ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Старт цикла рендеринга
        animate();
    </script>
</body>
</html>
