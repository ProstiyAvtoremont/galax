<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Автоматическая Галактика</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
    </style>
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <canvas id="galaxy"></canvas>

    <script>
        // --- НАСТРОЙКИ ---
        const TOTAL_SECTIONS = 6;       // Количество секторов глубины
        const STARS_PER_SECTION = 10000;// Количество звезд на один сектор
        const STAR_SIZE = 0.15;          // Базовый размер звезд
        const FLIGHT_SPEED = 2.5;       // Скорость полета вперед

        // --- ИНИЦИАЛИЗАЦИЯ СЦЕНЫ ---
        const canvas = document.getElementById('galaxy');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5; 

        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        // --- СОЗДАНИЕ ГАЛАКТИКИ ---
        const totalStars = STARS_PER_SECTION * TOTAL_SECTIONS;
        const starGeometry = new THREE.SphereGeometry(STAR_SIZE, 4, 4);
        const starMaterial = new THREE.MeshBasicMaterial({ color: 0xffffff });
        
        // Шейдер мерцания и свечения
        starMaterial.onBeforeCompile = (shader) => {
            shader.uniforms.uTime = { value: 0 };
            starMaterial.userData.shader = shader;

            shader.vertexShader = `
                attribute float aPhase;
                varying float vPhase;
                ${shader.vertexShader}
            `.replace(
                `#include <begin_vertex>`,
                `#include <begin_vertex>
                 vPhase = aPhase;`
            );

            shader.fragmentShader = `
                uniform float uTime;
                varying float vPhase;
                ${shader.fragmentShader}
            `.replace(
                `vec4 diffuseColor = vec4( diffuse, opacity );`,
                `float isYellow = step(0.1, vColor.g - vColor.b);
                 float blink = mix(0.3 + 0.7 * sin(uTime * 4.0 + vPhase * 60.0), 2.5, isYellow);
                 vec4 diffuseColor = vec4( diffuse * blink, opacity );`
            );
        };

        const starMesh = new THREE.InstancedMesh(starGeometry, starMaterial, totalStars);
        
        // Цвета по умолчанию
        const colors = new Float32Array(totalStars * 3);
        const defaultColor = new THREE.Color(0xffffff);
        for(let i = 0; i < totalStars; i++) {
            defaultColor.toArray(colors, i * 3);
        }
        starMesh.instanceColor = new THREE.InstancedBufferAttribute(colors, 3);

        const phases = new Float32Array(totalStars);
        const dummy = new THREE.Object3D();
        const initialPositions = [];

        // Распределяем звезды по секторам глубины
        const sectionDepth = 15; 
        let starIndex = 0;

        for (let s = 0; s < TOTAL_SECTIONS; s++) {
            const zOffset = -s * sectionDepth; 

            for (let i = 0; i < STARS_PER_SECTION; i++) {
                const x = (Math.random() - 0.5) * 35; 
                const y = (Math.random() - 0.5) * 20;
                const z = zOffset + (Math.random() - 0.5) * sectionDepth; 

                dummy.position.set(x, y, z);
                dummy.scale.set(1, 1, 1);
                dummy.updateMatrix();
                
                starMesh.setMatrixAt(starIndex, dummy.matrix);
                initialPositions.push(new THREE.Vector3(x, y, z));
                
                phases[starIndex] = Math.random();
                starIndex++;
            }
        }

        starGeometry.setAttribute('aPhase', new THREE.InstancedBufferAttribute(phases, 1));
        scene.add(starMesh);

        // --- ИНТЕРАКТИВ (RAYCASTING) ---
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 0.5; 
        const mouse = new THREE.Vector2(-100, -100);
        let hoveredInstanceId = null;

        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('mouseleave', () => {
            mouse.set(-100, -100);
        });

        function updateHover() {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(starMesh);

            if (intersects.length > 0) {
                const instanceId = intersects.instanceId;
                if (hoveredInstanceId !== instanceId) {
                    if (hoveredInstanceId !== null) resetStar(hoveredInstanceId);
                    hoveredInstanceId = instanceId;
                    highlightStar(instanceId);
                }
            } else {
                if (hoveredInstanceId !== null) {
                    resetStar(hoveredInstanceId);
                    hoveredInstanceId = null;
                }
            }
        }

        function highlightStar(id) {
            dummy.position.copy(initialPositions[id]);
            dummy.scale.set(10, 10, 10);
            dummy.updateMatrix();
            starMesh.setMatrixAt(id, dummy.matrix);

            const yellow = new THREE.Color(0xffd700);
            starMesh.setInstanceColorAt(id, yellow);
            
            starMesh.instanceMatrix.needsUpdate = true;
            starMesh.instanceColor.needsUpdate = true;
        }

        function resetStar(id) {
            dummy.position.copy(initialPositions[id]);
            dummy.scale.set(1, 1, 1);
            dummy.updateMatrix();
            starMesh.setMatrixAt(id, dummy.matrix);

            const white = new THREE.Color(0xffffff);
            starMesh.setInstanceColorAt(id, white);

            starMesh.instanceMatrix.needsUpdate = true;
            starMesh.instanceColor.needsUpdate = true;
        }

        // --- АНИМАЦИЯ ---
        const clock = new THREE.Clock();
        const totalDepth = TOTAL_SECTIONS * sectionDepth;

        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();
            
            if (starMaterial.userData.shader) {
                starMaterial.userData.shader.uniforms.uTime.value = time;
            }

            // Полет камеры вперед сквозь космос
            camera.position.z -= FLIGHT_SPEED * delta;

            // БЕСКОНЕЧНЫЙ ЦИКЛ
            if (camera.position.z < -totalDepth + 5) {
                camera.position.z = 5;
            }

            updateHover();
            renderer.render(scene, camera);
        }

        // --- АДАПТИВНОСТЬ ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
