<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE Starfield Space — Buy Your Own Star</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010105;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        .controls-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }
        .ui-btn {
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .ui-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }
        .search-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            display: flex;
            gap: 10px;
            background: rgba(5, 5, 15, 0.6);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 5px 15px;
            font-size: 13px;
            width: 140px;
        }
        .search-btn {
            background: #ffd700;
            border: none;
            color: #000;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        #star-tooltip {
            position: absolute;
            padding: 15px;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid #ffd700;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body>

<div class="search-container">
    <input type="number" id="search-input" class="search-input" placeholder="Star ID (0-1999999)" min="0">
    <button id="search-btn" class="search-btn">SEARCH</button>
</div>

<canvas id="starfield"></canvas>

<div id="star-tooltip"></div>

<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let cx = canvas.width / 2;
let cy = canvas.height / 2;

const MAX_STARS = 2000000;
const numStars = Math.min(4000, MAX_STARS);
const stars = [];

for (let i = 0; i < numStars; i++) {
    stars.push({
        x: (Math.random() - 0.5) * 3000,
        y: (Math.random() - 0.5) * 3000,
        z: Math.random() * 3000,
        screenX: 0,
        screenY: 0,
        currentSize: 0,
        isBought: false,
        tier: 'basic'
    });
}

/* =========================
   🔥 MODERN CAMERA BOUNDS FIX
========================= */

let minX = Infinity, maxX = -Infinity;
let minY = Infinity, maxY = -Infinity;

for (let i = 0; i < numStars; i++) {
    const s = stars[i];
    if (s.x < minX) minX = s.x;
    if (s.x > maxX) maxX = s.x;
    if (s.y < minY) minY = s.y;
    if (s.y > maxY) maxY = s.y;
}

function clampCamera(x, y) {
    const padding = 600;

    const minCamX = -(maxX + padding);
    const maxCamX = -(minX - padding);
    const minCamY = -(maxY + padding);
    const maxCamY = -(minY - padding);

    return {
        x: Math.min(maxCamX, Math.max(minCamX, x)),
        y: Math.min(maxCamY, Math.max(minCamY, y))
    };
}

/* ========================= */

let focusedStarIndex = null;
let targetXOffset = 0;
let targetYOffset = 0;
let currentXOffset = 0;
let currentYOffset = 0;

document.getElementById('search-btn').addEventListener('click', () => {
    const id = parseInt(document.getElementById('search-input').value);

    if (isNaN(id) || id < 0 || id >= numStars) {
        alert("Invalid Star ID");
        return;
    }

    const star = stars[id];

    focusedStarIndex = id;

    const cam = clampCamera(-star.x, -star.y);

    targetXOffset = cam.x;
    targetYOffset = cam.y;
});

let globalZOffset = 5000;

function animate(){
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if (focusedStarIndex !== null) {
        currentXOffset += (targetXOffset - currentXOffset) * 0.08;
        currentYOffset += (targetYOffset - currentYOffset) * 0.08;
    }

    for (let i = 0; i < numStars; i++) {
        const s = stars[i];

        const factor = 800 / (s.z + globalZOffset + 1);
        s.screenX = cx + (s.x + currentXOffset) * factor;
        s.screenY = cy + (s.y + currentYOffset) * factor;

        ctx.beginPath();
        ctx.arc(s.screenX, s.screenY, 1.5, 0, Math.PI*2);
        ctx.fillStyle = "white";
        ctx.fill();
    }

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
