<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE Starfield Space — Buy Your Own Star</title>
    <!-- Подключаем стабильную библиотеку Supabase -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010105;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        .controls-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .ui-btn {
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .ui-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* NEW: Search Bar Panel Styling */
        .search-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            display: flex;
            gap: 10px;
            background: rgba(5, 5, 15, 0.6);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }
        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 5px 15px;
            font-size: 13px;
            width: 140px;
        }
        .search-btn {
            background: #ffd700;
            border: none;
            color: #000;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .search-btn:hover {
            background: #fff;
        }

        /* Hover Tooltip Card */
        #star-tooltip {
            position: absolute;
            padding: 15px;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid #ffd700;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            min-width: 220px;
        }
        #star-tooltip.supernova { border-color: #ff3366; box-shadow: 0 0 25px rgba(255, 51, 102, 0.3); }
        #star-tooltip.constellation { border-color: #00ffff; box-shadow: 0 0 25px rgba(0, 255, 255, 0.3); }
        
        .tooltip-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; color: #ffd700; }
        #star-tooltip.supernova .tooltip-title { color: #ff3366; }
        #star-tooltip.constellation .tooltip-title { color: #00ffff; }
        .tooltip-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.7; }
        .tooltip-meta { color: #888; font-size: 10px; margin-top: 8px; word-break: break-all; }

        /* Neon Payment Modal */
        #payment-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(7, 7, 20, 0.95);
            border: 1px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
            border-radius: 20px;
            padding: 25px;
            width: 360px;
            text-align: center;
            backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #payment-modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            color: #aaa;
            font-size: 20px;
        }

        .tier-box {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
            text-align: left;
        }
        .tier-box.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

        .input-group {
            text-align: left;
            margin-top: 12px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: #ffd700;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 11px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }
        .input-field:focus {
            border-color: #ffd700;
        }

        .pay-btn {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            margin-top: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        .pay-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <!-- NEW: Search Input Interface Structure -->
    <div class="search-container">
        <input type="number" id="search-input" class="search-input" placeholder="Star ID (0-4999)" min="0" max="4999">
        <button id="search-btn" class="search-btn">SEARCH</button>
    </div>

    <canvas id="starfield"></canvas>
    
    <div class="controls-container">
        <button class="ui-btn" id="audio-btn">ENABLE AMBIENT</button>
    </div>

    <div id="star-tooltip"></div>

    <div id="payment-modal">
        <span class="modal-close" id="modal-close">&times;</span>
        <h3 id="modal-title" style="color: #ffd700; margin-top: 0; margin-bottom: 5px;">Claim This Star</h3>
        <p style="font-size: 12px; opacity: 0.7; margin-bottom: 15px;">Immortalize your name on the galaxy map via DOGE.</p>
        
        <div class="tier-box selected" data-tier="basic" data-price="7">
            <div style="font-weight:bold; color:#ffd700;">⭐ Basic Star (~7 DOGE)</div>
        </div>
        <div class="tier-box" data-tier="supernova" data-price="28">
            <div style="font-weight:bold; color:#ff3366;">✨ Supernova (~28 DOGE)</div>
        </div>
        <div class="tier-box" data-tier="constellation" data-price="250">
            <div style="font-weight:bold; color:#00ffff;">🌌 Constellation (~250 DOGE)</div>
        </div>

        <div class="input-group">
            <label for="star-owner">X (Twitter) Handle / Name</label>
            <input type="text" id="star-owner" class="input-field" placeholder="@elonmusk" maxlength="30">
        </div>
        <div class="input-group">
            <label for="star-msg">Your Message</label>
            <input type="text" id="star-msg" class="input-field" placeholder="To the moon! 🚀" maxlength="60">
        </div>

        <button class="pay-btn" id="pay-btn">Proceed to Web3 Payment</button>
    </div>

    <script>
    const SUPABASE_URL = "https://supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbHRua3dya2l4bm1neW9ucXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDU3MTMsImV4cCI6MjA5NDYyMTcxM30.FwI-F6eMifEo46dCNXNKsNpPSgibdwHMulGnlqs91VM";
    
    let supabase = null;
    if (typeof Supabase !== 'undefined') {
        supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');
    const audioBtn = document.getElementById('audio-btn');
    const tooltip = document.getElementById('star-tooltip');
    const modal = document.getElementById('payment-modal');
    const modalClose = document.getElementById('modal-close');
    const payBtn = document.getElementById('pay-btn');
    const tierBoxes = document.querySelectorAll('.tier-box');
    const ownerInput = document.getElementById('star-owner');
    const msgInput = document.getElementById('star-msg');

    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');

    const MERCHANT_WALLET = "DA56tToEYdJNfjma4sZ4wmQqec4KN1Dw4e";

    let selectedTier = "basic";
    let selectedPriceDoge = 7;
    let activeClickedStarNumber = null;

    let hoveredStar = null;
    let focusedStarIndex = null;

    let targetXOffset = 0;
    let targetYOffset = 0;
    let currentXOffset = 0;
    let currentYOffset = 0;

    let focusedStarHovered = false;

    let globalZOffset = 5000;
    const targetZOffset = 0;
    const flyInSpeed = 0.02;

    // =========================
    // INFINITE UNIVERSE SYSTEM
    // =========================

    const SECTOR_SIZE = 4000;
    const STARS_PER_SECTOR = 250;
    const loadedSectors = new Map();

    function seededRandom(seed) {
        const x = Math.sin(seed) * 10000;
        return x - Math.floor(x);
    }

    function generateSector(sectorX, sectorY) {

        const key = `${sectorX},${sectorY}`;

        if (loadedSectors.has(key)) {
            return loadedSectors.get(key);
        }

        const sectorStars = [];

        for (let i = 0; i < STARS_PER_SECTOR; i++) {

            const seed = sectorX * 999999 + sectorY * 777777 + i;

            sectorStars.push({
                id: `${sectorX}:${sectorY}:${i}`,

                x: sectorX * SECTOR_SIZE + seededRandom(seed) * SECTOR_SIZE,
                y: sectorY * SECTOR_SIZE + seededRandom(seed + 1) * SECTOR_SIZE,
                z: seededRandom(seed + 2) * 3000,

                phase: seededRandom(seed + 3) * Math.PI * 2,
                flickerSpeed: 0.02 + seededRandom(seed + 4) * 0.05,

                isBought: false,
                tier: 'basic',

                user_name: '',
                message: '',
                wallet_address: '',

                screenX: 0,
                screenY: 0,
                currentSize: 0
            });
        }

        loadedSectors.set(key, sectorStars);
        return sectorStars;
    }

    function getVisibleStars() {

        const cx = cameraXSector();
        const cy = cameraYSector();

        let result = [];

        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                result.push(...generateSector(cx + x, cy + y));
            }
        }

        return result;
    }

    function cameraXSector() {
        return Math.floor((currentXOffset) / SECTOR_SIZE);
    }

    function cameraYSector() {
        return Math.floor((currentYOffset) / SECTOR_SIZE);
    }

    // =========================
    // INIT
    // =========================

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let cx = canvas.width / 2;
    let cy = canvas.height / 2;

    // =========================
    // AUDIO (без изменений)
    // =========================

    let audioCtx = null;
    let isPlaying = false;

    function playTone(freq, duration, maxVolume) {
        if (!audioCtx || !isPlaying) return;

        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        const now = audioCtx.currentTime;
        gainNode.gain.setValueAtTime(0, now);
        gainNode.gain.linearRampToValueAtTime(maxVolume, now + duration * 0.4);
        gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + duration);
    }

    audioBtn.addEventListener('click', () => {
        if (!isPlaying) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            isPlaying = true;

            const notes = [329.63, 440.00, 493.88, 659.25];

            setInterval(() => {
                if (isPlaying)
                    playTone(notes[Math.floor(Math.random()*notes.length)], 8, 0.03);
            }, 6000);

            audioBtn.innerText = "MUTE AUDIO";
        } else {
            isPlaying = false;
            audioBtn.innerText = "ENABLE AMBIENT";
        }
    });

    // =========================
    // SEARCH (адаптирован)
    // =========================

    searchBtn.addEventListener('click', () => {

        const idVal = parseInt(searchInput.value);

        if (isNaN(idVal)) return;

        const sectorX = Math.floor(idVal / 100);
        const sectorY = idVal % 100;

        focusedStarIndex = idVal;

        targetXOffset = sectorX * SECTOR_SIZE;
        targetYOffset = sectorY * SECTOR_SIZE;
    });

    // =========================
    // INPUT / PAYMENT (без изменений логики)
    // =========================

    tierBoxes.forEach(box => {
        box.addEventListener('click', () => {
            tierBoxes.forEach(b => b.classList.remove('selected'));
            box.classList.add('selected');
            selectedTier = box.getAttribute('data-tier');
            selectedPriceDoge = parseFloat(box.getAttribute('data-price'));
        });
    });

    // =========================
    // MAIN LOOP
    // =========================

    function animate() {

        ctx.fillStyle = '#000002';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (globalZOffset > targetZOffset) {
            globalZOffset -= (globalZOffset - targetZOffset) * flyInSpeed;
        }

        if (focusedStarIndex !== null) {
            currentXOffset += (targetXOffset - currentXOffset) * 0.08;
            currentYOffset += (targetYOffset - currentYOffset) * 0.08;
        } else {
            currentXOffset *= 0.98;
            currentYOffset *= 0.98;
        }

        const stars = getVisibleStars();

        for (const star of stars) {

            const factor = 800 / (star.z + globalZOffset + 1);

            star.screenX = cx + (star.x + currentXOffset) * factor;
            star.screenY = cy + (star.y + currentYOffset) * factor;

            if (
                star.screenX < 0 || star.screenX > canvas.width ||
                star.screenY < 0 || star.screenY > canvas.height
            ) continue;

            star.phase += star.flickerSpeed;

            const brightness = 0.4 + Math.sin(star.phase) * 0.6;
            let size = Math.max(0.4, (1 - star.z / 8000) * 2);

            let color = `rgba(255,235,120,${brightness})`;

            if (star.isBought) {
                size *= 2.2;
                color = '#ffd700';
            }

            ctx.beginPath();
            ctx.arc(star.screenX, star.screenY, size, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
