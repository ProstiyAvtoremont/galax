<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DogeGalaxy — Зажги свою звезду</title>
    <!-- Подключаем библиотеку Supabase v2 -->
    <script src="https://jsdelivr.net"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #020205; font-family: "Segoe UI", Roboto, sans-serif; }
        
        /* Интерактивный глубокий космос */
        .space-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; cursor: pointer;
            background: radial-gradient(circle at center, #0a0a1a 0%, #020205 100%);
        }

        /* Статичные мерцающие фоновые звезды (CSS магия) */
        .star {
            position: absolute; background-color: #fff; border-radius: 50%;
            animation: blink 3s infinite ease-in-out; opacity: 0.3;
        }
        @keyframes blink { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.9; } }

        /* Наша Главная Dogecoin Звезда строго по центру экрана */
        .main-star-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: 5; cursor: pointer;
        }
        .main-star {
            width: 40px; height: 40px; background-color: #ffb11a; border-radius: 50%;
            box-shadow: 0 0 35px #ffb11a, 0 0 70px rgba(255, 177, 26, 0.6);
            animation: pulse 2.5s infinite ease-in-out; transition: all 0.3s;
        }
        .main-star:hover { transform: scale(1.15); box-shadow: 0 0 50px #ffb11a; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 30px #ffb11a; }
            50% { transform: scale(1.1); box-shadow: 0 0 55px #ffb11a, 0 0 90px rgba(255, 177, 26, 0.8); }
        }

        /* Красивое всплывающее неоновое окно */
        .modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.96); backdrop-filter: blur(15px);
            border: 2px solid #ffb11a; border-radius: 16px; padding: 30px;
            z-index: 9999; width: 90%; max-width: 400px; color: #fff;
            box-shadow: 0 0 40px rgba(255, 177, 26, 0.5);
            display: none; flex-direction: column; gap: 15px;
        }
        .modal h2 { color: #ffb11a; text-align: center; font-size: 22px; margin-bottom: 5px; }
        .modal input {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px; padding: 12px; color: #fff; font-size: 16px; width: 100%; outline: none;
        }
        .modal input:focus { border-color: #ffb11a; }
        .wallet-box {
            background: rgba(255, 177, 26, 0.1); border: 1px dashed #ffb11a;
            padding: 10px; border-radius: 8px; font-family: monospace;
            font-size: 13px; word-break: break-all; text-align: center; margin: 10px 0;
        }
        .btn {
            background: #ffb11a; color: #000; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;
            transition: all 0.2s; text-align: center;
        }
        .btn:hover { background: #ffe066; transform: scale(1.02); }
        .btn-close { background: transparent; color: #aaa; font-size: 14px; cursor: pointer; border: none; text-decoration: underline; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- 1. Наш независимый космос -->
    <div class="space-bg" id="space"></div>

    <!-- 2. Главная неоновая звезда Dogecoin -->
    <div class="main-star-container" id="star-trigger">
        <div class="main-star"></div>
    </div>

    <!-- 3. Всплывающее окно оплаты -->
    <div id="payment-modal" class="modal">
      <h2>Зажечь Звезду #1</h2>
      <p style="font-size: 14px; text-align: center; color: #ccc">Оставьте свое имя в цифровой галактике</p>
      <input type="text" id="username-input" placeholder="Ваше Имя или Ник в X" maxlength="20" />
      <p style="font-size: 14px; margin-top: 5px">Переведите <b>5 DOGE (~$1)</b> на кошелек:</p>
      <div class="wallet-box">DA56tToEYdJNfjma4sZ4wmQqec4KN1Dw4e</div>
      <button class="btn" id="submit-btn">Я оплатил(а)</button>
      <button class="btn-close" id="close-btn">Отмена</button>
    </div>

    <script>
      // ИНИЦИАЛИЗАЦИЯ SUPABASE
      const SUPABASE_URL = "https://supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbHRua3dya2l4bm1neW9ucXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDU3MTMsImV4cCI6MjA5NDYyMTcxM30.FwI-F6eMifEo46dCNXNKsNpPSgibdwHMulGnlqs91VM";
      const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const space = document.getElementById("space");
      const starTrigger = document.getElementById("star-trigger");
      const modal = document.getElementById("payment-modal");
      const closeBtn = document.getElementById("close-btn");
      const submitBtn = document.getElementById("submit-btn");
      const usernameInput = document.getElementById("username-input");

      // Автоматическая генерация 150 мерцающих звезд средствами HTML
      for (let i = 0; i < 150; i++) {
          const star = document.createElement("div");
          star.className = "star";
          star.style.left = Math.random() * 100 + "%";
          star.style.top = Math.random() * 100 + "%";
          const size = Math.random() * 3;
          star.style.width = size + "px";
          star.style.height = size + "px";
          star.style.animationDelay = Math.random() * 3 + "s";
          space.appendChild(star);
      }

      // КЛИК СТРОГО ПО ЗВЕЗДЕ ОТКРЫВАЕТ ОКНО
      starTrigger.addEventListener("click", (e) => {
          e.stopPropagation();
          modal.style.display = "flex";
      });

      // Кнопка отмены
      closeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        modal.style.display = "none";
        usernameInput.value = "";
      });

      // Логика кнопки "Я оплатил" с отправкой в Supabase
      submitBtn.addEventListener("click", async (e) => {
        e.stopPropagation();

        const name = usernameInput.value.trim();
        if (!name) {
          alert("Пожалуйста, введите ваше имя!");
          return;
        }

        submitBtn.innerText = "Запись в реестр...";
        submitBtn.disabled = true;

        try {
          const { data, error } = await supabaseClient
            .from("purchased_stars")
            .insert([{ star_number: 1, user_name: name, wallet_address: "DOGE-Transaction-Pending" }]);

          if (error) throw error;

          alert(`Спасибо, ${name}! Ваша звезда успешно внесена в реестр.`);
          modal.style.display = "none";
          usernameInput.value = "";
          
          // Визуальный эффект: звезда после оплаты горит синим неоном в знак подтверждения!
          document.querySelector(".main-star").style.backgroundColor = "#00f0ff";
          document.querySelector(".main-star").style.boxShadow = "0 0 35px #00f0ff, 0 0 70px rgba(0, 240, 255, 0.6)";
          
        } catch (err) {
          console.error("Ошибка Supabase:", err);
          alert(`Ошибка: ${err.message}. Проверьте, отключен ли RLS в Supabase для таблицы purchased_stars!`);
        } finally {
          submitBtn.innerText = "Я оплатил(а)";
          submitBtn.disabled = false;
        }
      });
    </script>
</body>
</html>
