<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Grid Star Map</title>
    <!-- Подключение Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #000002; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: #fff; 
            user-select: none;
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh; 
        }
        
        /* Панель управления поиском */
        .ui-panel { 
            position: absolute; 
            top: 20px; 
            left: 20px; 
            background: rgba(5, 5, 15, 0.85); 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #334; 
            backdrop-filter: blur(10px); 
            z-index: 10; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .ui-panel input { 
            background: #112; 
            border: 1px solid #445; 
            color: #fff; 
            padding: 10px; 
            border-radius: 4px; 
            margin-right: 8px; 
            width: 180px; 
            outline: none;
        }
        .ui-panel input:focus {
            border-color: #ffd700;
        }
        .ui-panel button { 
            background: #ffd700; 
            border: none; 
            color: #000; 
            padding: 10px 16px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.2s;
        }
        .ui-panel button:hover { 
            background: #ffe866; 
        }
        
        /* Кнопка эмбиента */
        #audioBtn { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(5, 5, 15, 0.85); 
            border: 1px solid #445; 
            color: #fff; 
            padding: 10px 16px; 
            border-radius: 4px; 
            cursor: pointer; 
            z-index: 10; 
            font-weight: bold;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        #audioBtn:hover {
            background: rgba(20, 20, 40, 0.9);
            border-color: #ffd700;
        }
        
        /* Всплывающие подсказки (Тултипы) */
        #tooltip { 
            position: absolute; 
            display: none; 
            background: rgba(2, 2, 8, 0.95); 
            border: 1px solid #557; 
            padding: 15px; 
            border-radius: 8px; 
            pointer-events: none; 
            z-index: 20; 
            min-width: 200px; 
            max-width: 280px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.8); 
        }
        #tooltip.basic { border-color: #ffd700; }
        #tooltip.supernova { border-color: #ff3366; box-shadow: 0 0 15px rgba(255, 51, 102, 0.4); }
        #tooltip.constellation { border-color: #00ffff; box-shadow: 0 0 15px rgba(0, 255, 255, 0.4); }
        
        .tooltip-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; opacity: 0.7; }
        .tooltip-title { font-size: 16px; font-weight: bold; margin-bottom: 6px; color: #fff; }

        /* Модальное окно покупки */
        .modal { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%) scale(0.9); 
            display: none; 
            background: rgba(10, 10, 25, 0.95); 
            border: 2px solid #ffd700; 
            padding: 30px; 
            border-radius: 12px; 
            z-index: 30; 
            width: 340px; 
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 0; 
            backdrop-filter: blur(10px);
        }
        .modal.active { 
            transform: translate(-50%, -50%) scale(1); 
            opacity: 1; 
        }
        .modal h3 { 
            margin-top: 0; 
            color: #ffd700; 
            font-size: 20px;
            margin-bottom: 20px;
        }
        .modal label {
            display: block;
            font-size: 12px;
            color: #aaa;
            margin-bottom: 5px;
        }
        .modal input { 
            width: 100%; 
            box-sizing: border-box; 
            background: #112; 
            border: 1px solid #445; 
            color: #fff; 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 18px; 
            outline: none;
        }
        .modal input:focus { border-color: #ffd700; }
        
        /* Выбор тиров в модалке */
        .tier-container { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
        }
        .tier-box { 
            flex: 1; 
            background: #112; 
            border: 1px solid #445; 
            padding: 10px 5px; 
            border-radius: 6px; 
            text-align: center; 
            cursor: pointer; 
            font-size: 11px; 
            transition: all 0.2s;
        }
        .tier-box.selected { 
            border-color: #ffd700; 
            background: rgba(255, 215, 0, 0.15); 
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
        }
        
        .modal-buttons { 
            display: flex; 
            gap: 12px; 
        }
        .modal-buttons button { 
            flex: 1; 
            padding: 12px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: all 0.2s;
        }
        .btn-pay { background: #ffd700; border: none; color: #000; }
        .btn-pay:hover { background: #ffe866; }
        .btn-pay:disabled { background: #555; color: #aaa; cursor: not-allowed; }
        .btn-close { background: #223; border: 1px solid #445; color: #fff; }
        .btn-close:hover { background: #334; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>
    
    <div class="ui-panel">
        <input type="number" id="searchInput" placeholder="ID звезды (0-1999999)" min="0" max="1999999">
        <button id="searchBtn">ПОИСК ЗВЕЗДЫ</button>
    </div>
    
    <button id="audioBtn">ENABLE AMBIENT</button>
    
    <div id="tooltip"></div>
    
    <div id="modal" class="modal">
        <h3 id="modal-title">Claim Star</h3>
        <label>Имя владельца:</label>
        <input type="text" id="ownerInput" placeholder="Anonymous">
        
        <label>Послание в космос:</label>
        <input type="text" id="msgInput" placeholder="To the moon! 🚀">
        
        <label>Выберите класс звезды:</label>
        <div class="tier-container">
            <div class="tier-box selected" data-tier="basic" data-price="100">⭐ Basic<br>100 DOGE</div>
            <div class="tier-box" data-tier="supernova" data-price="500">⚡ Supernova<br>500 DOGE</div>
            <div class="tier-box" data-tier="constellation" data-price="1000">🌌 Constell.<br>1000 DOGE</div>
        </div>
        
        <div class="modal-buttons">
            <button class="btn-pay" id="payBtn">Proceed to Web3 Payment</button>
            <button class="btn-close" id="modalClose">Cancel</button>
        </div>
    </div>

    <script>
        // --- CONFIG & INITIALIZATION ---
        const SUPABASE_URL = "https://your-supabase-url.supabase.co";
        const SUPABASE_KEY = "your-anon-key";
        const MERCHANT_WALLET = "0xYourMerchantWalletAddressHere";
        
        let supabase = null;
        try {
            if (typeof window.supabase !== 'undefined') {
                supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
        } catch (e) { console.warn("Supabase initialization skipped or configuration missing."); }

        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        
        let cx = canvas.width / 2;
        let cy = canvas.height / 2;
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            cx = canvas.width / 2;
            cy = canvas.height / 2;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // DOM элементы
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const audioBtn = document.getElementById('audioBtn');
        const tooltip = document.getElementById('tooltip');
        const modal = document.getElementById('modal');
        const modalClose = document.getElementById('modalClose');
        const ownerInput = document.getElementById('ownerInput');
        const msgInput = document.getElementById('msgInput');
        const payBtn = document.getElementById('payBtn');
        const tierBoxes = document.querySelectorAll('.tier-box');

        // Глобальное состояние карты звездного неба
        const numStars = 2000000; 
        const stars = [];
        const numParticles = 200;
        const particles = [];
        
        let selectedTier = 'basic';
        let selectedPriceDoge = 100;
        let activeClickedStarNumber = null;
        
        let focusedStarIndex = null;
        let focusedStarHovered = false;
        let targetXOffset = 0, targetYOffset = 0;
        let currentXOffset = 0, currentYOffset = 0;

        // Генерация массива звезд (базовые позиции)
        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 3500,
                y: (Math.random() - 0.5) * 3500,
                z: Math.random() * 2000,
                phase: Math.random() * Math.PI * 2,
                flickerSpeed: 0.01 + Math.random() * 0.04,
                isBought: false,
                tier: 'basic',
                user_name: '',
                message: '',
                screenX: 0,
                screenY: 0,
                currentSize: 1
            });
        }

        // Скорость полета космической пыли
        const flySpeed = 5;
        for (let i = 0; i < numParticles; i++) {
            particles.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000 });
        }

        // --- AUDIO ENGINE ---
        let audioCtx = null; let isPlaying = false;
        function playTone(freq, duration, maxVolume) {
            if (!audioCtx || !isPlaying) return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            const now = audioCtx.currentTime; gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(maxVolume, now + duration * 0.4);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + duration);
        }
        audioBtn.addEventListener('click', () => {
            if (!isPlaying) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); isPlaying = true;
                const notes = [329.63, 440.00, 493.88, 659.25];
                setInterval(() => { if(isPlaying) playTone(notes[Math.floor(Math.random()*notes.length)], 8, 0.03) }, 6000);
                audioBtn.innerText = "MUTE AUDIO";
            } else { isPlaying = false; audioBtn.innerText = "ENABLE AMBIENT"; }
        });

        // --- INTERACTIVITY HOVER & CLICK & SEARCH ---
        let hoveredStar = null;
        let globalZOffset = 5000; const targetZOffset = 0; const flyInSpeed = 0.02;

        tierBoxes.forEach(box => {
            box.addEventListener('click', () => {
                tierBoxes.forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                selectedTier = box.getAttribute('data-tier');
                selectedPriceDoge = parseFloat(box.getAttribute('data-price'));
            });
        });

        // Обработчик механики поискового движка
        searchBtn.addEventListener('click', () => {
            const idVal = parseInt(searchInput.value);
            if (isNaN(idVal) || idVal < 0 || idVal >= numStars) {
                alert("Please enter a valid Star ID from 0 to 1999999.");
                return;
            }

            const targetStar = stars[idVal];
            
            // Рассчитываем случайные экранные координаты в пределах видимой области (с безопасными отступами 15%)
            const paddingX = canvas.width * 0.15;
            const paddingY = canvas.height * 0.15;
            const randomScreenX = paddingX + Math.random() * (canvas.width - paddingX * 2);
            const randomScreenY = paddingY + Math.random() * (canvas.height - paddingY * 2);

            // Находим диапазон соседних звезд: 5 назад и 5 вперед
            const startId = Math.max(0, idVal - 5);
            const endId = Math.min(numStars - 1, idVal + 5);

            // Сдвигаем всю группу из 11 звезд, чтобы они выстроились на экране рядом друг с другом
            for (let i = startId; i <= endId; i++) {
                const currentStar = stars[i];
                const offsetIdx = i - idVal; // Смещение относительно искомой звезды (от -5 до +5)
                
                // Распределяем по горизонтали на экране с шагом в 45 пикселей
                const neighborScreenX = randomScreenX + offsetIdx * 45;
                const neighborScreenY = randomScreenY;

                currentStar.x = (neighborScreenX - cx) * (currentStar.z + 1) / 800;
                currentStar.y = (neighborScreenY - cy) * (currentStar.z + 1) / 800;
            }
            
            focusedStarIndex = idVal;
            targetXOffset = 0;
            targetYOffset = 0;

            if (targetStar.isBought) {
                // Если звезда куплена, принудительно открываем тултип рядом с ней
                setTimeout(() => {
                    tooltip.style.display = 'block';
                    tooltip.className = targetStar.tier;
                    
                    let label = targetStar.tier === 'supernova' ? '⚡ Supernova Core' : (targetStar.tier === 'constellation' ? '🌌 Constellation' : '⭐ Basic Star');
                    tooltip.innerHTML = `
                        <div class="tooltip-type" style="color:#ffd700; font-weight:bold;">📍 FOUND STAR #${idVal}</div>
                        <div class="tooltip-type" style="margin-top:5px;">${label}</div>
                        <div class="tooltip-title">${targetStar.user_name || 'Anonymous Buyer'}</div>
                        <div style="font-style:italic; opacity:0.9; margin: 4px 0;">"${targetStar.message}"</div>
                        <div style="font-size:11px; color:#ffd700; margin: 4px 0;">Coords: X:${Math.round(targetStar.x)} Y:${Math.round(targetStar.y)} Z:${Math.round(targetStar.z)}</div>
                    `; // Адрес криптокошелька скрыт для безопасности

                    // Проверка выхода за пределы экрана
                    let left = randomScreenX + 20;
                    let top = randomScreenY - 20;

                    if (left + tooltip.offsetWidth > window.innerWidth) {
                        left = randomScreenX - tooltip.offsetWidth - 20;
                    }
                    if (top + tooltip.offsetHeight > window.innerHeight) {
                        top = window.innerHeight - tooltip.offsetHeight - 20;
                    }
                    if (left < 10) left = 10;
                    if (top < 10) top = 10;

                    tooltip.style.left = `${left}px`;
                    tooltip.style.top = `${top}px`;
                }, 400);
            } else {
                // Если свободна — убираем тултип и предлагаем купить её
                tooltip.style.display = 'none';
                if (confirm(`Star #${idVal} [X:${Math.round(targetStar.x)}, Y:${Math.round(targetStar.y)}, Z:${Math.round(targetStar.z)}] is FREE! Would you like to buy it right now?`)) {
                    activeClickedStarNumber = idVal;
                    document.getElementById('modal-title').innerText = `Claim Star #${idVal} (${Math.round(targetStar.x)}, ${Math.round(targetStar.y)})`;
                    modal.style.display = 'block';
                    setTimeout(() => modal.classList.add('active'), 10);
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            let foundStar = null;
            let foundStarIdx = null;
            focusedStarHovered = false;

            if (focusedStarIndex !== null) {
                const focusedStar = stars[focusedStarIndex];
                const dxFocus = mouseX - focusedStar.screenX;
                const dyFocus = mouseY - focusedStar.screenY;
                const focusRadius = Math.max(focusedStar.currentSize * 8, 25);

                if (dxFocus * dxFocus + dyFocus * dyFocus < focusRadius * focusRadius) {
                    focusedStarHovered = true;
                    canvas.style.cursor = 'pointer';
                }
            }

            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                if (!star.isBought) continue;
                const dx = mouseX - star.screenX; const dy = mouseY - star.screenY;
                const hitRadius = Math.max(star.currentSize * 3, 10);
                if (dx * dx + dy * dy < hitRadius * hitRadius) { foundStar = star; foundStarIdx = i; break; }
            }

            if (foundStar) {
                focusedStarIndex = null; // Отменяем фокус поиска, если пользователь водит мышкой
                hoveredStar = foundStar;
                tooltip.style.display = 'block';
                tooltip.className = foundStar.tier;
                
                let label = foundStar.tier === 'supernova' ? '⚡ Supernova Core' : (foundStar.tier === 'constellation' ? '🌌 Constellation' : '⭐ Basic Star');
                tooltip.innerHTML = `
                    <div class="tooltip-type" style="color:#ffd700; font-weight:bold;">📍 STAR #${foundStarIdx}</div>
                    <div class="tooltip-type">${label}</div>
                    <div class="tooltip-title">${foundStar.user_name || 'Anonymous Buyer'}</div>
                    <div style="font-style:italic; opacity:0.9; margin: 4px 0;">"${foundStar.message}"</div>
                    <div style="font-size:11px; color:#ffd700; margin: 4px 0;">Coords: X:${Math.round(foundStar.x)} Y:${Math.round(foundStar.y)} Z:${Math.round(foundStar.z)}</div>
                `; // Адрес криптокошелька скрыт для безопасности

                // Проверка выхода за пределы экрана
                let left = e.clientX + 15;
                let top = e.clientY + 15;

                if (left + tooltip.offsetWidth > window.innerWidth) {
                    left = e.clientX - tooltip.offsetWidth - 15;
                }
                if (top + tooltip.offsetHeight > window.innerHeight) {
                    top = e.clientY - tooltip.offsetHeight - 15;
                }
                if (left < 10) left = 10;
                if (top < 10) top = 10;

                tooltip.style.left = `${left}px`;
                tooltip.style.top = `${top}px`;

                if (!focusedStarHovered) {
                    canvas.style.cursor = 'crosshair';
                }
            } else { 
                if (focusedStarIndex === null) {
                    hoveredStar = null; 
                    tooltip.style.display = 'none'; 
                }
            }
        });

        canvas.addEventListener('click', (e) => {
            if (hoveredStar) return;
            focusedStarIndex = null;
            tooltip.style.display = 'none';

            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            let closestStarIdx = 0;
            let minDist = Infinity;

            for (let i = 0; i < numStars; i++) {
                if (stars[i].isBought) continue;
                const dx = mouseX - stars[i].screenX;
                const dy = mouseY - stars[i].screenY;
                const dist = dx*dx + dy*dy;
                if (dist < minDist) { minDist = dist; closestStarIdx = i; }
            }

            activeClickedStarNumber = closestStarIdx;
            const cStar = stars[closestStarIdx];
            document.getElementById('modal-title').innerText = `Claim Star #${closestStarIdx} (${Math.round(cStar.x)}, ${Math.round(cStar.y)})`;
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        });

        // ОТПРАВКА ДАННЫХ В SUPABASE
        payBtn.addEventListener('click', async () => {
            const userNameVal = ownerInput.value.trim() || "Anonymous";
            const msgVal = msgInput.value.trim() || "To the moon! 🚀";
            let userWalletAddress = "0xManualDogeTransferPayment";

            payBtn.disabled = true;
            payBtn.innerText = "Connecting Wallet...";

            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    if (accounts && accounts[0]) { userWalletAddress = accounts[0]; }
                    await window.ethereum.request({
                        method: 'eth_sendTransaction',
                        params: [{ to: MERCHANT_WALLET, from: accounts, value: '0x0' }],
                    });
                } catch (e) { console.log("Wallet link bypassed."); }
            }

            payBtn.innerText = "Saving to Space Grid...";

            try {
                if (supabase) {
                    await supabase.from('purchased_stars').insert([
                        { star_number: activeClickedStarNumber, user_name: userNameVal, wallet_address: userWalletAddress, tier: selectedTier, message: msgVal }
                    ]);
                }
            } catch (err) { console.error("Database sync issue:", err.message); }

            stars[activeClickedStarNumber].isBought = true;
            stars[activeClickedStarNumber].user_name = userNameVal;
            stars[activeClickedStarNumber].wallet_address = userWalletAddress;
            stars[activeClickedStarNumber].tier = selectedTier;
            stars[activeClickedStarNumber].message = msgVal;

            alert(`Success! Star #${activeClickedStarNumber} is registered.`);
            
            ownerInput.value = ""; msgInput.value = "";
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
            payBtn.disabled = false;
            payBtn.innerText = "Proceed to Web3 Payment";
        });

        // --- 3. Render Pipeline Loop ---
        let startTime = Date.now();
        function animate() {
            ctx.fillStyle = '#000002'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const time = (Date.now() - startTime) * 0.001;

            if (globalZOffset > targetZOffset) globalZOffset -= (globalZOffset - targetZOffset) * flyInSpeed;

            // Плавная интерполяция смещения камеры к выбранной звезде
            if (focusedStarIndex !== null) {
                currentXOffset += (targetXOffset - currentXOffset) * 0.08;
                currentYOffset += (targetYOffset - currentYOffset) * 0.08;
            } else {
                // Если фокуса поиска нет, камера медленно возвращается в центр
                currentXOffset += (0 - currentXOffset) * 0.02;
                currentYOffset += (0 - currentYOffset) * 0.02;
            }

            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                
                // Оптимизация производительности: рендерим первые 5000 фоновых звезд + купленные + центральную звезду поиска с её 10 соседями
                if (i >= 5000 && !star.isBought && (focusedStarIndex === null || Math.abs(i - focusedStarIndex) > 5)) continue;
                
                // Применяем текущие смещения камеры (currentXOffset / currentYOffset) к проекции
                const factor = 800 / (star.z + globalZOffset + 1);
                star.screenX = cx + (star.x + currentXOffset) * factor; 
                star.screenY = cy + (star.y + currentYOffset) * factor;

                if (star.screenX >= 0 && star.screenX <= canvas.width && star.screenY >= 0 && star.screenY <= canvas.height) {
                    star.phase += star.flickerSpeed;
                    const brightness = 0.4 + Math.sin(star.phase) * 0.6;
                    const baseSize = (1 - (star.z + globalZOffset) / 8000) * 2.2;
                    
                    let size = Math.max(0.4, baseSize * (0.7 + brightness * 0.3));
                    let starColor = `rgba(255, 235, 120, ${brightness})`;
                    let auraColor = `rgba(255, 215, 0, ${brightness * 0.15})`;

                    if (star.isBought) {
                        if (star.tier === 'basic') { size *= 2.0; starColor = `rgba(255, 235, 120, 1)`; } 
                        else if (star.tier === 'supernova') {
                            const pulse = 1.2 + Math.sin(time * 6) * 0.4;
                            size *= 2.8 * pulse; starColor = `rgba(255, 51, 102, 1)`; auraColor = `rgba(255, 51, 102, 0.35)`;
                        } else if (star.tier === 'constellation') {
                            size *= 3.8; starColor = `rgba(0, 255, 255, 1)`; auraColor = `rgba(0, 255, 255, 0.4)`;
                        }
                    }

                    star.currentSize = size;
                    if (focusedStarIndex === i && focusedStarHovered) {
                        const hoverPulse = 2.4 + Math.sin(time * 10) * 0.3;
                        size *= hoverPulse;
                    }

                    // Рисуем яркий прицел вокруг сфокусированной через поиск звезды
                    if (focusedStarIndex === i) {
                        ctx.beginPath();
                        ctx.arc(star.screenX, star.screenY, size * 6 + Math.sin(time * 8) * 4, 0, Math.PI * 2);
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }

                    if (focusedStarIndex === i && focusedStarHovered) {
                        auraColor = `rgba(255, 215, 0, 0.9)`;
                    }
                    ctx.beginPath(); ctx.arc(star.screenX, star.screenY, size * 2.8, 0, Math.PI * 2);
                    ctx.fillStyle = auraColor; ctx.fill();
                    ctx.beginPath(); ctx.arc(star.screenX, star.screenY, size, 0, Math.PI * 2);
                    ctx.fillStyle = starColor; ctx.fill();
                }
            }

            // Летящие частицы космической пыли
            if (globalZOffset < 500) {
                for (let i = 0; i < numParticles; i++) {
                    const p = particles[i]; p.z -= flySpeed;
                    if (p.z <= 0) { p.z = 2000; p.x = (Math.random() - 0.5) * 2000; p.y = (Math.random() - 0.5) * 2000; }
                    const pFactor = 800 / (p.z + 1);
                    const pScreenX = cx + p.x * pFactor; const pScreenY = cy + p.y * pFactor;
                    if (pScreenX >= 0 && pScreenX <= canvas.width && pScreenY >= 0 && pScreenY <= canvas.height) {
                        const pSize = (1 - p.z / 2000) * 4.5; const alpha = (1 - p.z / 2000) * 0.6;
                        ctx.beginPath(); ctx.moveTo(pScreenX, pScreenY);
                        ctx.lineTo(cx + p.x * (800 / (p.z + flySpeed * 2.5 + 1)), cy + p.y * (800 / (p.z + flySpeed * 2.5 + 1)));
                        ctx.strokeStyle = `rgba(255, 220, 160, ${alpha})`; ctx.lineWidth = pSize * 0.4; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
