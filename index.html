<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE Starfield Space — Buy Your Own Star</title>

    <script src="https://jsdelivr.net"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010105;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        .controls-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .ui-btn {
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }

        .ui-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .search-container {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 15;
            display: flex;
            gap: 10px;
            background: rgba(5, 5, 15, 0.6);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .search-input {
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            padding: 5px 15px;
            font-size: 13px;
            width: 140px;
        }

        .search-btn {
            background: #ffd700;
            border: none;
            color: #000;
            padding: 6px 15px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #fff;
        }

        #star-tooltip {
            position: absolute;
            padding: 15px;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid #ffd700;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            min-width: 220px;
        }

        #star-tooltip.supernova {
            border-color: #ff3366;
            box-shadow: 0 0 25px rgba(255, 51, 102, 0.3);
        }

        #star-tooltip.constellation {
            border-color: #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }

        .tooltip-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 4px;
            color: #ffd700;
        }

        .tooltip-type {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .tooltip-meta {
            color: #888;
            font-size: 10px;
            margin-top: 8px;
            word-break: break-all;
        }
    </style>
</head>

<body>

<div class="search-container">
    <input type="number" id="search-input" class="search-input" placeholder="Star ID (0-4999)" min="0" max="4999">
    <button id="search-btn" class="search-btn">SEARCH</button>
</div>

<canvas id="starfield"></canvas>

<div class="controls-container">
    <button class="ui-btn" id="audio-btn">ENABLE AMBIENT</button>
</div>

<div id="star-tooltip"></div>

<script>

const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener('resize', resize);
resize();

let cx = canvas.width / 2;
let cy = canvas.height / 2;

const numStars = 5000;
const stars = [];

for (let i = 0; i < numStars; i++) {

    stars.push({
        x: (Math.random() - 0.5) * 3000,
        y: (Math.random() - 0.5) * 3000,
        z: Math.random() * 3000,

        phase: Math.random() * Math.PI * 2,
        flickerSpeed: 0.02 + Math.random() * 0.05,

        isBought: false,

        screenX: 0,
        screenY: 0,
        currentSize: 0
    });
}

let focusedStarIndex = null;

let targetXOffset = 0;
let targetYOffset = 0;

let currentXOffset = 0;
let currentYOffset = 0;

const searchInput = document.getElementById('search-input');
const searchBtn = document.getElementById('search-btn');
const tooltip = document.getElementById('star-tooltip');

searchBtn.addEventListener('click', () => {

    const idVal = parseInt(searchInput.value);

    if (isNaN(idVal) || idVal < 0 || idVal >= numStars) {
        alert("Please enter a valid Star ID from 0 to 4999.");
        return;
    }

    const targetStar = stars[idVal];

    focusedStarIndex = idVal;

    targetXOffset = -targetStar.x;
    targetYOffset = -targetStar.y;
});

let globalZOffset = 5000;
const targetZOffset = 0;
const flyInSpeed = 0.02;

let startTime = Date.now();

function animate() {

    ctx.fillStyle = '#000002';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const time = (Date.now() - startTime) * 0.001;

    if (globalZOffset > targetZOffset) {
        globalZOffset -= (globalZOffset - targetZOffset) * flyInSpeed;
    }

    if (focusedStarIndex !== null) {

        currentXOffset += (targetXOffset - currentXOffset) * 0.08;
        currentYOffset += (targetYOffset - currentYOffset) * 0.08;

    } else {

        currentXOffset += (0 - currentXOffset) * 0.02;
        currentYOffset += (0 - currentYOffset) * 0.02;
    }

    for (let i = 0; i < numStars; i++) {

        const star = stars[i];

        // ⭐ ВАЖНО:
        // ВРАЩЕНИЕ УДАЛЕНО
        // STAR.X И STAR.Y БОЛЬШЕ НЕ ИЗМЕНЯЮТСЯ

        const factor = 800 / (star.z + globalZOffset + 1);

        star.screenX = cx + (star.x + currentXOffset) * factor;
        star.screenY = cy + (star.y + currentYOffset) * factor;

        if (
            star.screenX >= 0 &&
            star.screenX <= canvas.width &&
            star.screenY >= 0 &&
            star.screenY <= canvas.height
        ) {

            star.phase += star.flickerSpeed;

            const brightness = 0.4 + Math.sin(star.phase) * 0.6;

            const baseSize =
                (1 - (star.z + globalZOffset) / 8000) * 2.2;

            const size =
                Math.max(0.4, baseSize * (0.7 + brightness * 0.3));

            star.currentSize = size;

            if (focusedStarIndex === i) {

                ctx.beginPath();

                ctx.arc(
                    star.screenX,
                    star.screenY,
                    size * 6 + Math.sin(time * 8) * 4,
                    0,
                    Math.PI * 2
                );

                ctx.strokeStyle = '#ffd700';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            ctx.beginPath();

            ctx.arc(
                star.screenX,
                star.screenY,
                size * 2.8,
                0,
                Math.PI * 2
            );

            ctx.fillStyle = `rgba(255, 215, 0, ${brightness * 0.15})`;

            ctx.fill();

            ctx.beginPath();

            ctx.arc(
                star.screenX,
                star.screenY,
                size,
                0,
                Math.PI * 2
            );

            ctx.fillStyle =
                `rgba(255, 235, 120, ${brightness})`;

            ctx.fill();
        }
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
