        .neighbor-item {

        .neighbor-item:hover {

        .neighbor-item.is-selected {

        .neighbor-item.is-purchased {

        .neighbor-item.is-purchased.tier-supernova {

        .neighbor-num.is-selected-num {

        .neighbor-dot {
            width: 7px;

        .neighbor-dot.bought { background: #ffd700; }
        .neighbor-dot.supernova { background: #ff3366; box-shadow: 0 0 5px #ff3366; }
        .neighbor-dot.constellation { background: #00ffff; box-shadow: 0 0 5px #00ffff; }
        .neighbor-info {
            flex: 1;
            overflow: hidden;
        }
        .neighbor-name {
            font-size: 11px;
            color: #ddd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .neighbor-name.free {
            color: #444;
            font-style: italic;
        }
        .neighbor-msg {
            font-size: 9px;
            color: #666;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 1px;
        }
    </style>
</head>
<body>

    <div class="search-container">

    <script>
        const SUPABASE_URL = "https://xfltnkwrkixnmgyonqrt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbHRua3dya2l4bm1neW9ucXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDU3MTMsImV4cCI6MjA5NDYyMTcxM30.FwI-F6eMifEo46dCNXNKsNpPSgibdwHMulGnlqs91VM";

        let db = null;

        // Supabase script is in <head> so it's already loaded by the time
        // this <body> script runs — call initSupabase directly after stars are built.
        // loadPurchasedStars() is called from initSupabase() below the stars loop.

        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const audioBtn = document.getElementById('audio-btn');
        const tooltip = document.getElementById('star-tooltip');
        const modal = document.getElementById('payment-modal');
        const modalClose = document.getElementById('modal-close');
        const payBtn = document.getElementById('pay-btn');
        const tierBoxes = document.querySelectorAll('.tier-box');
        const ownerInput = document.getElementById('star-owner');
        const msgInput = document.getElementById('star-msg');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const MERCHANT_WALLET = "DA56tToEYdJNfjma4sZ4wmQqec4KN1Dw4e";
        
        let selectedTier = "basic";
        let selectedPriceDoge = 1;
        let activeClickedStarNumber = null;
        let focusedStarIndex = null;
        let previousFocusedIndex = null;  // tracks the last focused star so old neighbors can be hidden
        let pinnedStarIndex = null;   // star pinned from the neighbors panel
        let pinnedTooltipHTML = '';   // tooltip content for the pinned star
        let targetXOffset = 0;
        let targetYOffset = 0;
        let currentXOffset = 0;
        let currentYOffset = 0;
        let focusedStarHovered = false;
        let startTime = 0;

        // --- ФУНКЦИЯ ОПРЕДЕЛЕНИЯ СОСЕДЕЙ ---
        function isNeighborStar(i) {
            return focusedStarIndex !== null && i >= focusedStarIndex - 5 && i <= focusedStarIndex + 5;
        }

        // Reset positions of stars that were neighbors of the old focus so they move off-screen
        function clearPreviousNeighbors(oldCenter) {
            if (oldCenter === null) return;
            const rangeMin = Math.max(0, oldCenter - 5);
            const rangeMax = Math.min(numStars - 1, oldCenter + 5);
            for (let i = rangeMin; i <= rangeMax; i++) {
                if (stars[i].isBought) continue; // keep purchased stars in place
                // Scatter them far outside the viewport so they're invisible
                stars[i].x = ((Math.random() - 0.5) * 3000) + (Math.random() < 0.5 ? -8000 : 8000);
                stars[i].y = ((Math.random() - 0.5) * 3000) + (Math.random() < 0.5 ? -8000 : 8000);
            }
        }

        // --- NEIGHBORS PANEL ---
        const neighborsPanel = document.getElementById('neighbors-panel');
        const neighborsList = document.getElementById('neighbors-list');
        const neighborsTitle = document.getElementById('neighbors-title');
        const neighborsLoading = document.getElementById('neighbors-loading');
        let lastNeighborsFocus = null;

        async function updateNeighborsPanel(centerIndex) {
            if (centerIndex === null) {
                neighborsPanel.classList.remove('visible');
                clearPreviousNeighbors(previousFocusedIndex);
                previousFocusedIndex = null;
                lastNeighborsFocus = null;
                return;
            }
            if (centerIndex === lastNeighborsFocus) return;

            // Clear old neighbors before showing new ones
            clearPreviousNeighbors(previousFocusedIndex);
            previousFocusedIndex = centerIndex;
            lastNeighborsFocus = centerIndex;

            const rangeMin = Math.max(0, centerIndex - 5);
            const rangeMax = Math.min(numStars - 1, centerIndex + 5);

            neighborsTitle.textContent = `Stars #${rangeMin} – #${rangeMax}`;
            neighborsLoading.textContent = 'Loading…';
            neighborsList.innerHTML = '';
            neighborsPanel.classList.add('visible');

            // Fetch from Supabase for this range
            let dbMap = {};
            if (db) {
                try {
                    const { data, error } = await db
                        .from('purchased_stars')
                        .select('star_number, user_name, tier, message')
                        .gte('star_number', rangeMin)
                        .lte('star_number', rangeMax);
                    if (!error && data) {
                        data.forEach(row => { dbMap[row.star_number] = row; });
                    }
                } catch (err) {
                    console.error('Neighbors fetch error:', err);
                }
            }

            neighborsLoading.textContent = '';
            neighborsList.innerHTML = '';

            // Spread the new neighbor stars across the free sky zone
            const slots = rangeMax - rangeMin + 1;
            const freeMargin = 40;
            const freeLeft = 270 + freeMargin;
            const freeRight = canvas.width - freeMargin;
            const freeTop = freeMargin;
            const freeBottom = canvas.height - 90 - freeMargin;
            const cols = 4, rows = Math.ceil(slots / 4);
            const cellW = (freeRight - freeLeft) / cols;
            const cellH = (freeBottom - freeTop) / Math.max(rows, 1);
            let slot = 0;
            for (let i = rangeMin; i <= rangeMax; i++) {
                if (i === centerIndex) { slot++; continue; }
                if (stars[i].isBought) { slot++; continue; }
                const col = slot % cols;
                const row = Math.floor(slot / cols);
                const sx = freeLeft + cellW * col + cellW * (0.2 + Math.random() * 0.6);
                const sy = freeTop  + cellH * row + cellH * (0.2 + Math.random() * 0.6);
                stars[i].x = (sx - cx) * (stars[i].z + 1) / 800;
                stars[i].y = (sy - cy) * (stars[i].z + 1) / 800;
                slot++;
            }

            for (let i = rangeMin; i <= rangeMax; i++) {
                const inMemory = stars[i] && stars[i].isBought;
                const dbRow = dbMap[i];
                const isPurchased = inMemory || !!dbRow;
                const tier = (dbRow && dbRow.tier) || (inMemory && stars[i].tier) || 'basic';
                const userName = (dbRow && dbRow.user_name) || (inMemory && stars[i].user_name) || '';
                const msg = (dbRow && dbRow.message) || (inMemory && stars[i].message) || '';
                const isCenter = (i === centerIndex);

                const item = document.createElement('div');
                item.className = 'neighbor-item' +
                    (isPurchased ? ' is-purchased tier-' + tier : '') +
                    (isCenter ? ' is-selected' : '');

                const dotClass = isPurchased
                    ? (tier === 'supernova' ? 'supernova' : tier === 'constellation' ? 'constellation' : 'bought')
                    : '';

                item.innerHTML = `
                    <span class="neighbor-num${isCenter ? ' is-selected-num' : ''}">#${i}${isCenter ? ' ◀' : ''}</span>
                    <span class="neighbor-dot ${dotClass}"></span>
                    <span class="neighbor-info">
                        <div class="neighbor-name${!isPurchased ? ' free' : ''}">${isPurchased ? (userName || 'Anonymous') : 'Available'}</div>
                        ${isPurchased && msg ? `<div class="neighbor-msg">"${msg}"</div>` : ''}
                    </span>
                `;

                // Clicking a neighbor row pins that star on screen with its tooltip
                item.addEventListener('click', () => {
                    const targetId = i;
                    const tStar = stars[targetId];

                    // Clear previous pin
                    pinnedStarIndex = null;
                    tooltip.style.display = 'none';

                    // Position the star in free sky area (away from panels)
                    const { sx: rScreenX, sy: rScreenY } = getFreeZonePoint();
                    tStar.x = (rScreenX - cx) * (tStar.z + 1) / 800;
                    tStar.y = (rScreenY - cy) * (tStar.z + 1) / 800;
                    clearPreviousNeighbors(previousFocusedIndex);
                    focusedStarIndex = targetId;
                    previousFocusedIndex = targetId;
                    targetXOffset = 0;
                    targetYOffset = 0;
                    lastNeighborsFocus = null; // force panel refresh
                    updateNeighborsPanel(targetId);

                    // Build tooltip content
                    const row = dbMap[targetId];
                    const isPurchasedNow = tStar.isBought || !!row;

                    if (isPurchasedNow) {
                        const uName = (row && row.user_name) || tStar.user_name || 'Anonymous Buyer';
                        const uMsg  = (row && row.message)   || tStar.message   || '';
                        const uTier = (row && row.tier)      || tStar.tier      || 'basic';
                        const uWallet = tStar.wallet_address || '';
                        let label = uTier === 'supernova' ? '⚡ Supernova Core'
                                  : uTier === 'constellation' ? '🌌 Constellation'
                                  : '⭐ Basic Star';
                        pinnedTooltipHTML = `
                            <div class="tooltip-type" style="color:#ffd700; font-weight:bold;">📍 STAR #${targetId}</div>
                            <div class="tooltip-type" style="margin-top:5px;">${label}</div>
                            <div class="tooltip-title">${uName}</div>
                            <div style="font-style:italic; opacity:0.9; margin: 4px 0;">"${uMsg}"</div>
                        `;
                        tooltip.className = uTier;
                    } else {
                        pinnedTooltipHTML = `
                            <div class="tooltip-type" style="color:#ffd700; font-weight:bold;">📍 STAR #${targetId}</div>
                            <div class="tooltip-type" style="margin-top:5px;">⭐ Available</div>
                            <div class="tooltip-title" style="color:#aaa;">Free — click to purchase</div>
                        `;
                        tooltip.className = '';
                    }

                    // Pin after a short delay so screenX/Y are updated by the renderer
                    setTimeout(() => {
                        pinnedStarIndex = targetId;
                        tooltip.innerHTML = pinnedTooltipHTML;
                        tooltip.style.display = 'block';
                        // Initial position near the star
                        const sx = tStar.screenX || rScreenX;
                        const sy = tStar.screenY || rScreenY;
                        let left = sx + 20;
                        let top  = sy - 20;
                        if (left + tooltip.offsetWidth  > window.innerWidth)  left = sx - tooltip.offsetWidth  - 20;
                        if (top  + tooltip.offsetHeight > window.innerHeight) top  = sy - tooltip.offsetHeight - 20;
                        if (left < 10) left = 10;
                        if (top  < 10) top  = 10;
                        tooltip.style.left = `${left}px`;
                        tooltip.style.top  = `${top}px`;
                    }, 200);
                });

                // Double-click on an Available row opens the purchase modal for that star
                if (!isPurchased) {
                    item.addEventListener('dblclick', (e) => {
                        e.stopPropagation();
                        const tStar = stars[i];
                        activeClickedStarNumber = i;
                        focusedStarIndex = i;
                        const { sx: rScreenX, sy: rScreenY } = getFreeZonePoint();
                        tStar.x = (rScreenX - cx) * (tStar.z + 1) / 800;
                        tStar.y = (rScreenY - cy) * (tStar.z + 1) / 800;
                        document.getElementById('modal-title').innerText = `Claim Star #${i} (${Math.round(tStar.x)}, ${Math.round(tStar.y)})`;
                        modal.style.display = 'block';
                        setTimeout(() => modal.classList.add('active'), 10);
                    });
                }

                neighborsList.appendChild(item);
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Returns a random {sx, sy} guaranteed to fall in the open sky area —
        // away from the left-side panels (search + promo + neighbors) and the bottom bar.
        function getFreeZonePoint() {
            // Left panel column: ~260px wide, full height
            // Bottom bar: ~80px tall
            // Small margin so the star isn't flush against a panel edge
            const margin = 40;
            const leftBlocked = 270;   // width of left-side UI column
            const bottomBlocked = 90;  // height of bottom controls bar
            const minX = leftBlocked + margin;
            const maxX = canvas.width  - margin;
            const minY = margin;
            const maxY = canvas.height - bottomBlocked - margin;
            const sx = minX + Math.random() * (maxX - minX);
            const sy = minY + Math.random() * (maxY - minY);
            return { sx, sy };
        }

        let cx = canvas.width / 2;
        let cy = canvas.height / 2;

        const numStars = 2000000;
        const stars = [];
        const rotateSpeed = 0.3;

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 3000,
                y: (Math.random() - 0.5) * 3000,
                z: Math.random() * 3000,
                phase: Math.random() * Math.PI * 2,
                flickerSpeed: 0.02 + Math.random() * 0.05,
                isBought: false,
                tier: 'basic',
                user_name: '',
                message: '',
                wallet_address: '',
                screenX: 0,
                screenY: 0,
                currentSize: 0
            });
        }

        // Stars array is ready — init Supabase, load purchased stars, then start rendering
        async function initSupabaseAndStart() {
            try {
                if (window.supabase && window.supabase.createClient) {
                    db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                    await loadPurchasedStars(); // wait for DB before first render
                } else {
                    console.error("Supabase library not available.");
                }
            } catch(e) {
                console.error("Supabase init error:", e.message);
            }
            // Start rendering only after purchased stars are loaded
            startTime = Date.now();
            animate();
        }
        initSupabaseAndStart();

        async function loadPurchasedStars() {
            if (!db) { console.error("loadPurchasedStars: db is null"); return; }
            try {
                const { data, error } = await db.from('purchased_stars').select('star_number, user_name, wallet_address, tier, message');
                if (error) { console.error("loadPurchasedStars error:", error.message); return; }
                if (data) {
                    console.log(`loadPurchasedStars: loaded ${data.length} stars from DB`);
                    data.forEach(row => {
                        const idx = row.star_number;
                        if (idx !== null && idx >= 0 && idx < numStars) {
                            stars[idx].isBought = true;
                            stars[idx].user_name = row.user_name;
                            stars[idx].wallet_address = row.wallet_address;
                            stars[idx].tier = row.tier || 'basic';
                            stars[idx].message = row.message || 'To the moon! 🚀';
                        }
                    });
                }
            } catch (err) {
                console.error("Supabase data mapping failed:", err);
            }
        }
        const numParticles = 100;
        const particles = [];
        const flySpeed = 5;
        for (let i = 0; i < numParticles; i++) {
            particles.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000 });
        }

        let audioCtx = null;
        let isPlaying = false;
        function playTone(freq, duration, maxVolume) {
            if (!audioCtx || !isPlaying) return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            const now = audioCtx.currentTime; gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(maxVolume, now + duration * 0.4);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + duration);
        }
        audioBtn.addEventListener('click', () => {
            if (!isPlaying) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); isPlaying = true;
                const notes = [329.63, 440.00, 493.88, 659.25];
                setInterval(() => { if(isPlaying) playTone(notes[Math.floor(Math.random()*notes.length)], 8, 0.03) }, 6000);
                audioBtn.innerText = "MUTE AUDIO";
            } else { isPlaying = false; audioBtn.innerText = "ENABLE AMBIENT"; }
        });

        let hoveredStar = null;
        let globalZOffset = 5000; const targetZOffset = 0; const flyInSpeed = 0.02;

        tierBoxes.forEach(box => {
            box.addEventListener('click', () => {
                tierBoxes.forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                selectedTier = box.getAttribute('data-tier');
                selectedPriceDoge = parseFloat(box.getAttribute('data-price'));
            });
        });

        searchInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') searchBtn.click();
        });

        searchBtn.addEventListener('click', () => {
            const idVal = parseInt(searchInput.value);
            if (isNaN(idVal) || idVal < 0 || idVal >= numStars) {
                alert("Please enter a valid Star ID from 0 to 1999999.");
                return;
            }

            const targetStar = stars[idVal];
            const { sx: randomScreenX, sy: randomScreenY } = getFreeZonePoint();

            targetStar.x = (randomScreenX - cx) * (targetStar.z + 1) / 800;
            targetStar.y = (randomScreenY - cy) * (targetStar.z + 1) / 800;
            
            clearPreviousNeighbors(previousFocusedIndex);
            focusedStarIndex = idVal;
            previousFocusedIndex = idVal;
            targetXOffset = 0;
            targetYOffset = 0;
            updateNeighborsPanel(idVal);

            if (targetStar.isBought) {
                setTimeout(() => {
                    tooltip.style.display = 'block';
                    tooltip.className = targetStar.tier;
                    let label = targetStar.tier === 'supernova' ? '⚡ Supernova Core' : (targetStar.tier === 'constellation' ? '🌌 Constellation' : '⭐ Basic Star');
                    tooltip.innerHTML = `
                        <div class="tooltip-type" style="color:#ffd700; font-weight:bold;">📍 FOUND STAR #${idVal}</div>
                        <div class="tooltip-type" style="margin-top:5px;">${label}</div>
                        <div class="tooltip-title">${targetStar.user_name || 'Anonymous Buyer'}</div>
                        <div style="font-style:italic; opacity:0.9; margin: 4px 0;">"${targetStar.message}"</div>
                        <div style="font-size:11px; color:#ffd700; margin: 4px 0;">Coords: X:${Math.round(targetStar.x)} Y:${Math.round(targetStar.y)} Z:${Math.round(targetStar.z)}</div>
                    `;
                    let left = randomScreenX + 20;
                    let top = randomScreenY - 20;
                    if (left + tooltip.offsetWidth > window.innerWidth) left = randomScreenX - tooltip.offsetWidth - 20;
                    if (top + tooltip.offsetHeight > window.innerHeight) top = window.innerHeight - tooltip.offsetHeight - 20;
                    if (left < 10) left = 10;
                    if (top < 10) top = 10;
                    tooltip.style.left = `${left}px`;
                    tooltip.style.top = `${top}px`;
                }, 400);
            } else {
                if (confirm(`Star #${idVal} [X:${Math.round(targetStar.x)}, Y:${Math.round(targetStar.y)}, Z:${Math.round(targetStar.z)}] is FREE! Would you like to buy it right now?`)) {
                    activeClickedStarNumber = idVal;
                    document.getElementById('modal-title').innerText = `Claim Star #${idVal} (${Math.round(targetStar.x)}, ${Math.round(targetStar.y)})`;
                    modal.style.display = 'block';
                    setTimeout(() => modal.classList.add('active'), 10);
                }
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            let foundStar = null;
            let foundStarIdx = null;
            focusedStarHovered = false;

            if (focusedStarIndex !== null) {
                const focusedStar = stars[focusedStarIndex];
                const dxFocus = mouseX - focusedStar.screenX;
                const dyFocus = mouseY - focusedStar.screenY;
                const focusRadius = Math.max(focusedStar.currentSize * 8, 25);
                if (dxFocus * dxFocus + dyFocus * dyFocus < focusRadius * focusRadius) {
                    focusedStarHovered = true;
                    canvas.style.cursor = 'pointer';
                }
            }

            // If a star is pinned from the panel, keep its tooltip anchored to it
            if (pinnedStarIndex !== null) {
                const ps = stars[pinnedStarIndex];
                const dxP = mouseX - ps.screenX;
                const dyP = mouseY - ps.screenY;
                const hoverR = Math.max(ps.currentSize * 8, 25);
                const isHoveringPin = dxP * dxP + dyP * dyP < hoverR * hoverR;

                // Update tooltip position to track the star
                let left = ps.screenX + 20;
                let top  = ps.screenY - 20;
                if (left + tooltip.offsetWidth  > window.innerWidth)  left = ps.screenX - tooltip.offsetWidth  - 20;
                if (top  + tooltip.offsetHeight > window.innerHeight) top  = ps.screenY - tooltip.offsetHeight - 20;
                if (left < 10) left = 10;
                if (top  < 10) top  = 10;
                tooltip.style.left = `${left}px`;
                tooltip.style.top  = `${top}px`;
                tooltip.style.display = 'block';

                canvas.style.cursor = isHoveringPin ? 'pointer' : 'crosshair';
                return; // skip regular hover logic while a star is pinned
            }

            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                if (!star.isBought && !isNeighborStar(i)) continue;
                const dx = mouseX - star.screenX; const dy = mouseY - star.screenY;
                const hitRadius = Math.max(star.currentSize * 3, 10);
                if (dx * dx + dy * dy < hitRadius * hitRadius) { foundStar = star; foundStarIdx = i; break; }
            }

            if (foundStar) {
                focusedStarIndex = null;
                hoveredStar = foundStar;
                tooltip.style.display = 'block';
                tooltip.className = foundStar.tier;
                let label = foundStar.tier === 'supernova' ? '⚡ Supernova Core' : (foundStar.tier === 'constellation' ? '🌌 Constellation' : '⭐ Basic Star');
                tooltip.innerHTML = `
                    <div class="tooltip-type" style="color:#ffd700; font-weight:bold;">📍 STAR #${foundStarIdx}</div>
                    <div class="tooltip-type">${label}</div>
                    <div class="tooltip-title">${foundStar.user_name || 'Anonymous Buyer'}</div>
                    <div style="font-style:italic; opacity:0.9; margin: 4px 0;">"${foundStar.message}"</div>
                    <div style="font-size:11px; color:#ffd700; margin: 4px 0;">Coords: X:${Math.round(foundStar.x)} Y:${Math.round(foundStar.y)} Z:${Math.round(foundStar.z)}</div>
                `;
                let left = e.clientX + 15;
                let top = e.clientY + 15;
                if (left + tooltip.offsetWidth > window.innerWidth) left = e.clientX - tooltip.offsetWidth - 15;
                if (top + tooltip.offsetHeight > window.innerHeight) top = e.clientY - tooltip.offsetHeight - 15;
                if (left < 10) left = 10;
                if (top < 10) top = 10;
                tooltip.style.left = `${left}px`;
                tooltip.style.top = `${top}px`;
                if (!focusedStarHovered) canvas.style.cursor = 'crosshair';
            } else { 
                if (focusedStarIndex === null) {
                    hoveredStar = null;
                    tooltip.style.display = 'none'; 
                }
            }
        });

        canvas.addEventListener('click', (e) => {
            if (hoveredStar) return;
            tooltip.style.display = 'none';

            // Find the next free star in ascending order (0, 1, 2, ...)
            let nextFreeIdx = null;
            for (let i = 0; i < numStars; i++) {
                if (!stars[i].isBought) { nextFreeIdx = i; break; }
            }
            if (nextFreeIdx === null) return; // all stars bought

            // Focus camera on that star
            clearPreviousNeighbors(previousFocusedIndex);
            focusedStarIndex = nextFreeIdx;
            previousFocusedIndex = nextFreeIdx;
            updateNeighborsPanel(nextFreeIdx);

            const { sx: rScreenX, sy: rScreenY } = getFreeZonePoint();
            const nStar = stars[nextFreeIdx];
            nStar.x = (rScreenX - cx) * (nStar.z + 1) / 800;
            nStar.y = (rScreenY - cy) * (nStar.z + 1) / 800;
            targetXOffset = 0;
            targetYOffset = 0;

            // Open purchase modal for this free star
            activeClickedStarNumber = nextFreeIdx;
            document.getElementById('modal-title').innerText = `Claim Star #${nextFreeIdx} (${Math.round(nStar.x)}, ${Math.round(nStar.y)})`;
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        });

        payBtn.addEventListener('click', async () => {
            const userNameVal = ownerInput.value.trim() || "Anonymous";
            const msgVal = msgInput.value.trim() || "To the moon! 🚀";
            let userWalletAddress = "0xManualDogeTransferPayment";

            payBtn.disabled = true;
            payBtn.innerText = "Connecting Wallet...";

            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    if (accounts && accounts[0]) { userWalletAddress = accounts[0]; }
                    await window.ethereum.request({
                        method: 'eth_sendTransaction',
                        params: [{ to: MERCHANT_WALLET, from: accounts, value: '0x0' }],
                    });
                } catch (e) { console.log("Wallet link bypassed."); }
            }

            payBtn.innerText = "Saving to Space Grid...";
            try {
                if (db) {
                    const { error } = await db.from('purchased_stars').insert([
                        { star_number: activeClickedStarNumber, user_name: userNameVal, wallet_address: userWalletAddress, tier: selectedTier, message: msgVal }
                    ]);
                    if (error) {
                        console.error("Supabase insert error:", error.message);
                        alert(`⚠️ Database save failed: ${error.message}`);
                    }
                }
            } catch (err) { console.error("Database sync issue:", err.message); }

            stars[activeClickedStarNumber].isBought = true;
            stars[activeClickedStarNumber].user_name = userNameVal;
            stars[activeClickedStarNumber].wallet_address = userWalletAddress;
            stars[activeClickedStarNumber].tier = selectedTier;
            stars[activeClickedStarNumber].message = msgVal;

            alert(`Success! Star #${activeClickedStarNumber} is registered.`);
            ownerInput.value = ""; msgInput.value = "";
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
            payBtn.disabled = false;
            payBtn.innerText = "Proceed to Web3 Payment";
        });

        function animate() {
            ctx.fillStyle = '#000002';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const time = (Date.now() - startTime) * 0.001;
            if (globalZOffset > targetZOffset) globalZOffset -= (globalZOffset - targetZOffset) * flyInSpeed;
            if (focusedStarIndex !== null) {
                currentXOffset += (targetXOffset - currentXOffset) * 0.08;
                currentYOffset += (targetYOffset - currentYOffset) * 0.08;
            } else {
                currentXOffset += (0 - currentXOffset) * 0.02;
                currentYOffset += (0 - currentYOffset) * 0.02;
            }

            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                if (i >= 5000 && !star.isBought && i !== focusedStarIndex && !isNeighborStar(i)) continue;

                const factor = 800 / (star.z + globalZOffset + 1);
                star.screenX = cx + (star.x + currentXOffset) * factor; 
                star.screenY = cy + (star.y + currentYOffset) * factor;

                if (star.screenX >= 0 && star.screenX <= canvas.width && star.screenY >= 0 && star.screenY <= canvas.height) {
                    star.phase += star.flickerSpeed;
                    const brightness = 0.4 + Math.sin(star.phase) * 0.6;
                    const baseSize = (1 - (star.z + globalZOffset) / 8000) * 2.2;
                    let size = Math.max(0.4, baseSize * (0.7 + brightness * 0.3));
                    let starColor = `rgba(255, 235, 120, ${brightness})`;
                    let auraColor = `rgba(255, 215, 0, ${brightness * 0.15})`;

                    if (star.isBought && focusedStarIndex === i) {
                        if (star.tier === 'basic') { size *= 2.0;
                            starColor = `rgba(255, 235, 120, 1)`; } 
                        else if (star.tier === 'supernova') {
                            const pulse = 1.2 + Math.sin(time * 6) * 0.4;
                            size *= 2.8 * pulse; starColor = `rgba(255, 51, 102, 1)`; auraColor = `rgba(255, 51, 102, 0.35)`;
                        } else if (star.tier === 'constellation') {
                            size *= 3.8;
                            starColor = `rgba(0, 255, 255, 1)`; auraColor = `rgba(0, 255, 255, 0.4)`;
                        }
                    } else if (star.isBought) {
                        // Non-focused purchased star: slightly brighter than a free star but no big aura
                        size *= 1.4;
                        starColor = `rgba(255, 235, 120, 0.7)`;
                    }

                    star.currentSize = size;

                    if (focusedStarIndex === i) {
                        // Hover pulse on the selected star
                        if (focusedStarHovered) {
                            size *= 2.4 + Math.sin(time * 10) * 0.3;
                            auraColor = `rgba(255, 215, 0, 0.9)`;
                        }
                        // Glow ring — only on the selected star
                        ctx.beginPath();
                        ctx.arc(star.screenX, star.screenY, size * 6 + Math.sin(time * 8) * 4, 0, Math.PI * 2);
                        ctx.strokeStyle = '#ffd700';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        // Full aura + core for selected star
                        ctx.beginPath();
                        ctx.arc(star.screenX, star.screenY, size * 2.8, 0, Math.PI * 2);
                        ctx.fillStyle = auraColor; ctx.fill();
                        ctx.beginPath();
                        ctx.arc(star.screenX, star.screenY, size, 0, Math.PI * 2);
                        ctx.fillStyle = starColor; ctx.fill();
                    } else {
                        // Neighbor / background / purchased stars: plain small dot, no glow ring
                        ctx.beginPath();
                        ctx.arc(star.screenX, star.screenY, size * 1.4, 0, Math.PI * 2);
                        ctx.fillStyle = auraColor; ctx.fill();
                        ctx.beginPath();
                        ctx.arc(star.screenX, star.screenY, size, 0, Math.PI * 2);
                        ctx.fillStyle = starColor; ctx.fill();
                    }
                }
            }

            if (globalZOffset < 500) {
                for (let i = 0; i < numParticles; i++) {
                    const p = particles[i];
                    p.z -= flySpeed;
                    if (p.z <= 0) { p.z = 2000; p.x = (Math.random() - 0.5) * 2000;
                        p.y = (Math.random() - 0.5) * 2000; }
                    const pFactor = 800 / (p.z + 1);
                    const pScreenX = cx + p.x * pFactor; const pScreenY = cy + p.y * pFactor;
                    if (pScreenX >= 0 && pScreenX <= canvas.width && pScreenY >= 0 && pScreenY <= canvas.height) {
                        const pSize = (1 - p.z / 2000) * 4.5;
                        const alpha = (1 - p.z / 2000) * 0.6;
                        ctx.beginPath(); ctx.moveTo(pScreenX, pScreenY);
                        ctx.lineTo(cx + p.x * (800 / (p.z + flySpeed * 2.5 + 1)), cy + p.y * (800 / (p.z + flySpeed * 2.5 + 1)));
                        ctx.strokeStyle = `rgba(255, 220, 160, ${alpha})`; ctx.lineWidth = pSize * 0.4; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
    </script>
