<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE Starfield Space — Buy Your Own Star</title>
    <!-- Подключаем официальный JS-клиент Supabase -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #010105;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        .controls-container {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .ui-btn {
            padding: 12px 24px;
            background: rgba(255, 215, 0, 0.08);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 30px;
            color: #ffd700;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .ui-btn:hover {
            background: rgba(255, 215, 0, 0.25);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        /* Hover Tooltip Card */
        #star-tooltip {
            position: absolute;
            padding: 15px;
            background: rgba(5, 5, 15, 0.9);
            border: 1px solid #ffd700;
            border-radius: 12px;
            color: #fff;
            font-size: 13px;
            pointer-events: none;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            min-width: 220px;
        }
        #star-tooltip.supernova { border-color: #ff3366; box-shadow: 0 0 25px rgba(255, 51, 102, 0.3); }
        #star-tooltip.constellation { border-color: #00ffff; box-shadow: 0 0 25px rgba(0, 255, 255, 0.3); }
        
        .tooltip-title { font-weight: bold; font-size: 15px; margin-bottom: 4px; color: #ffd700; }
        #star-tooltip.supernova .tooltip-title { color: #ff3366; }
        #star-tooltip.constellation .tooltip-title { color: #00ffff; }
        .tooltip-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.7; }
        .tooltip-meta { color: #aaa; font-size: 11px; margin-top: 5px; }

        /* Neon Payment Modal */
        #payment-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(7, 7, 20, 0.95);
            border: 1px solid #ffd700;
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.25);
            border-radius: 20px;
            padding: 25px;
            width: 360px;
            text-align: center;
            backdrop-filter: blur(15px);
            z-index: 200;
            display: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #payment-modal.active {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            color: #aaa;
            font-size: 20px;
        }
        
        .tier-box {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 10px;
            margin: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.02);
            text-align: left;
        }
        .tier-box.selected {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.08);
        }

        /* Inputs Styling */
        .input-group {
            text-align: left;
            margin-top: 12px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            color: #ffd700;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .input-field {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            outline: none;
            transition: border 0.2s;
        }
        .input-field:focus {
            border-color: #ffd700;
        }

        .pay-btn {
            width: 100%;
            padding: 12px;
            background: #ffd700;
            border: none;
            border-radius: 25px;
            color: #000;
            font-weight: bold;
            font-size: 14px;
            margin-top: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        .pay-btn:disabled {
            background: #555;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>
    
    <div class="controls-container">
        <button class="ui-btn" id="audio-btn">ENABLE AMBIENT</button>
    </div>

    <div id="star-tooltip"></div>

    <!-- Payment Modal with Fields -->
    <div id="payment-modal">
        <span class="modal-close" id="modal-close">&times;</span>
        <h3 style="color: #ffd700; margin-top: 0; margin-bottom: 5px;">Claim This Star</h3>
        <p style="font-size: 12px; opacity: 0.7; margin-bottom: 15px;">Fill details to write your name onto the starfield via DOGE.</p>
        
        <div class="tier-box selected" data-tier="basic" data-price="7">
            <div style="font-weight:bold; color:#ffd700;">⭐ Basic Star (~7 DOGE)</div>
        </div>
        <div class="tier-box" data-tier="supernova" data-price="28">
            <div style="font-weight:bold; color:#ff3366;">✨ Supernova (~28 DOGE)</div>
        </div>
        <div class="tier-box" data-tier="constellation" data-price="250">
            <div style="font-weight:bold; color:#00ffff;">🌌 Constellation (~250 DOGE)</div>
        </div>

        <!-- Поля ввода информации -->
        <div class="input-group">
            <label for="star-owner">X (Twitter) Handle / Name</label>
            <input type="text" id="star-owner" class="input-field" placeholder="@elonmusk" maxlength="30">
        </div>
        <div class="input-group">
            <label for="star-msg">Your Broadcast Message</label>
            <input type="text" id="star-msg" class="input-field" placeholder="To the moon! 🚀" maxlength="60">
        </div>

        <button class="pay-btn" id="pay-btn">Proceed to Web3 Payment</button>
    </div>

    <script>
        // Инициализация Supabase
        const SUPABASE_URL = "https://xfltnkwrkixnmgyonqrt.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmbHRua3dya2l4bm1neW9ucXJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwNDU3MTMsImV4cCI6MjA5NDYyMTcxM30.FwI-F6eMifEo46dCNXNKsNpPSgibdwHMulGnlqs91VM";
        const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        const audioBtn = document.getElementById('audio-btn');
        const tooltip = document.getElementById('star-tooltip');
        const modal = document.getElementById('payment-modal');
        const modalClose = document.getElementById('modal-close');
        const payBtn = document.getElementById('pay-btn');
        const tierBoxes = document.querySelectorAll('.tier-box');
        
        const ownerInput = document.getElementById('star-owner');
        const msgInput = document.getElementById('star-msg');

        const MERCHANT_WALLET = "DA56tToEYdJNfjma4sZ4wmQqec4KN1Dw4e";
        let selectedTier = "basic";
        let selectedPriceDoge = 7;
        let activeClickedStarIndex = null; // Индекс выбранной пользователем звезды

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        let cx = canvas.width / 2;
        let cy = canvas.height / 2;

        // 1. Инициализация 5000 звезд
        const numStars = 5000;
        const stars = [];
        const rotateSpeed = 0.3;

        for (let i = 0; i < numStars; i++) {
            stars.push({
                x: (Math.random() - 0.5) * 3000,
                y: (Math.random() - 0.5) * 3000,
                z: Math.random() * 3000,
                phase: Math.random() * Math.PI * 2,
                flickerSpeed: 0.02 + Math.random() * 0.05,
                isBought: false,
                tier: 'basic',
                owner: '',
                message: '',
                screenX: 0,
                screenY: 0,
                currentSize: 0
            });
        }

        // Загрузка купленных звезд из Supabase DB
        async function loadPurchasedStars() {
            try {
                const { data, error } = await supabase.from('purchased_stars').select('*');
                if (error) throw error;
                
                if (data) {
                    data.forEach(row => {
                        if (row.star_index < numStars) {
                            stars[row.star_index].isBought = true;
                            stars[row.star_index].tier = row.tier;
                            stars[row.star_index].owner = row.owner;
                            stars[row.star_index].message = row.message;
                        }
                    });
                }
            } catch (err) {
                console.error("Error loading stars from Supabase:", err.message);
            }
        }
        loadPurchasedStars();

        // 2. Частицы
        const numParticles = 100;
        const particles = [];
        const flySpeed = 5;
        for (let i = 0; i < numParticles; i++) {
            particles.push({ x: (Math.random() - 0.5) * 2000, y: (Math.random() - 0.5) * 2000, z: Math.random() * 2000 });
        }

        // --- AMBIENT SOUND ---
        let audioCtx = null; let isPlaying = false;
        function playTone(freq, duration, maxVolume) {
            if (!audioCtx || !isPlaying) return;
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            const now = audioCtx.currentTime; gainNode.gain.setValueAtTime(0, now);
            gainNode.gain.linearRampToValueAtTime(maxVolume, now + duration * 0.4);
            gainNode.gain.exponentialRampToValueAtTime(0.001, now + duration);
            osc.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + duration);
        }
        audioBtn.addEventListener('click', () => {
            if (!isPlaying) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)(); isPlaying = true;
                const notes = [329.63, 440.00, 493.88, 659.25];
                setInterval(() => { if(isPlaying) playTone(notes[Math.floor(Math.random()*notes.length)], 8, 0.03) }, 6000);
                audioBtn.innerText = "MUTE AUDIO";
            } else { isPlaying = false; audioBtn.innerText = "ENABLE AMBIENT"; }
        });

        // --- INTERACTIVITY HOVER & CLICK ---
        let hoveredStar = null;
        let globalZOffset = 5000; const targetZOffset = 0; const flyInSpeed = 0.02;

        tierBoxes.forEach(box => {
            box.addEventListener('click', () => {
                tierBoxes.forEach(b => b.classList.remove('selected'));
                box.classList.add('selected');
                selectedTier = box.getAttribute('data-tier');
                selectedPriceDoge = parseFloat(box.getAttribute('data-price'));
            });
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            let foundStar = null;

            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                if (!star.isBought) continue;
                const dx = mouseX - star.screenX; const dy = mouseY - star.screenY;
                const hitRadius = Math.max(star.currentSize * 3, 10);
                if (dx * dx + dy * dy < hitRadius * hitRadius) { foundStar = star; break; }
            }

            if (foundStar) {
                hoveredStar = foundStar;
                tooltip.style.display = 'block';
                tooltip.style.left = `${e.clientX + 15}px`;
                tooltip.style.top = `${e.clientY + 15}px`;
                tooltip.className = foundStar.tier;
                
                let label = foundStar.tier === 'supernova' ? '⚡ Supernova Core' : (foundStar.tier === 'constellation' ? '🌌 Constellation' : '⭐ Basic Star');
                tooltip.innerHTML = `
                    <div class="tooltip-type">${label}</div>
                    <div class="tooltip-title">${foundStar.owner || 'Anonymous'}</div>
                    <div style="font-style:italic; opacity:0.9;">"${foundStar.message || 'No message'}"</div>
                    <div class="tooltip-meta">Verified Blockchain Star</div>
                `;
            } else { hoveredStar = null; tooltip.style.display = 'none'; }
        });

        canvas.addEventListener('click', (e) => {
            if (hoveredStar) return;

            // Находим ближайшую к клику мыши пустую звезду, чтобы зафиксировать её индекс
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            let closestStarIdx = 0;
            let minDist = Infinity;

            for (let i = 0; i < numStars; i++) {
                if (stars[i].isBought) continue;
                const dx = mouseX - stars[i].screenX;
                const dy = mouseY - stars[i].screenY;
                const dist = dx*dx + dy*dy;
                if (dist < minDist) { minDist = dist; closestStarIdx = i; }
            }

            activeClickedStarIndex = closestStarIdx;
            modal.style.display = 'block';
            setTimeout(() => modal.classList.add('active'), 10);
        });

        modalClose.addEventListener('click', () => {
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        });

        // КНОПКА ОПЛАТЫ И ОТПРАВКИ В SUPABASE
        payBtn.addEventListener('click', async () => {
            const ownerVal = ownerInput.value.trim() || "Anonymous";
            const msgVal = msgInput.value.trim() || "To the moon!";

            payBtn.disabled = true;
            payBtn.innerText = "Processing Wallet...";

            // Имитация Web3 оплаты или реальный вызов
            if (typeof window.ethereum !== 'undefined') {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    await window.ethereum.request({
                        method: 'eth_sendTransaction',
                        params: [{ to: MERCHANT_WALLET, from: accounts[0], value: '0x0' }],
                    });
                } catch (e) {
                    console.log("Wallet payment bypass/cancel, switching to base handler.");
                }
            }

            payBtn.innerText = "Saving to Space Grid...";

            // Сохранение записи в Supabase
            try {
                const { error } = await supabase
                    .from('purchased_stars')
                    .insert([
                        { 
                            star_index: activeClickedStarIndex, 
                            tier: selectedTier, 
                            owner: ownerVal, 
                            message: msgVal 
                        }
                    ]);

                if (error) throw error;

                // Обновляем звезду локально на карте без перезагрузки страницы
                stars[activeClickedStarIndex].isBought = true;
                stars[activeClickedStarIndex].tier = selectedTier;
                stars[activeClickedStarIndex].owner = ownerVal;
                stars[activeClickedStarIndex].message = msgVal;

                alert("Success! Your star has been successfully registered in the galaxy.");
                
                // Сброс формы и закрытие
                ownerInput.value = "";
                msgInput.value = "";
                modal.classList.remove('active');
                setTimeout(() => modal.style.display = 'none', 300);

            } catch (err) {
                alert("Database Error: " + err.message);
            } finally {
                payBtn.disabled = false;
                payBtn.innerText = "Proceed to Web3 Payment";
            }
        });

        // 3. Render Engine Pipeline Loop
        let startTime = Date.now();
        function animate() {
            ctx.fillStyle = '#000002'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            const time = (Date.now() - startTime) * 0.001;

            if (globalZOffset > targetZOffset) globalZOffset -= (globalZOffset - targetZOffset) * flyInSpeed;

            for (let i = 0; i < numStars; i++) {
                const star = stars[i];
                const rad = rotateSpeed * 0.005; const cos = Math.cos(rad); const sin = Math.sin(rad);
                const x1 = star.x * cos - star.y * sin; const y1 = star.y * cos + star.x * sin;
                star.x = x1; star.y = y1;

                const factor = 800 / (star.z + globalZOffset + 1);
                star.screenX = cx + star.x * factor; star.screenY = cy + star.y * factor;

                if (star.screenX >= 0 && star.screenX <= canvas.width && star.screenY >= 0 && star.screenY <= canvas.height) {
                    star.phase += star.flickerSpeed;
                    const brightness = 0.4 + Math.sin(star.phase) * 0.6;
                    const baseSize = (1 - (star.z + globalZOffset) / 8000) * 2.2;
                    
                    let size = Math.max(0.4, baseSize * (0.7 + brightness * 0.3));
                    let starColor = `rgba(255, 235, 120, ${brightness})`;
                    let auraColor = `rgba(255, 215, 0, ${brightness * 0.15})`;

                    // Изменение внешнего вида купленной звезды на лету
                    if (star.isBought) {
                        if (star.tier === 'basic') {
                            size *= 2.0;
                            starColor = `rgba(255, 235, 120, 1)`;
                        } else if (star.tier === 'supernova') {
                            const pulse = 1.2 + Math.sin(time * 6) * 0.4;
                            size *= 2.8 * pulse;
                            starColor = `rgba(255, 51, 102, 1)`;
                            auraColor = `rgba(255, 51, 102, 0.35)`;
                        } else if (star.tier === 'constellation') {
                            size *= 3.8;
                            starColor = `rgba(0, 255, 255, 1)`;
                            auraColor = `rgba(0, 255, 255, 0.4)`;
                        }
                    }

                    star.currentSize = size;

                    ctx.beginPath(); ctx.arc(star.screenX, star.screenY, size * 2.8, 0, Math.PI * 2);
                    ctx.fillStyle = auraColor; ctx.fill();

                    ctx.beginPath(); ctx.arc(star.screenX, star.screenY, size, 0, Math.PI * 2);
                    ctx.fillStyle = starColor; ctx.fill();
                }
            }

            // Отрисовка летящих частиц
            if (globalZOffset < 500) {
                for (let i = 0; i < numParticles; i++) {
                    const p = particles[i]; p.z -= flySpeed;
                    if (p.z <= 0) { p.z = 2000; p.x = (Math.random() - 0.5) * 2000; p.y = (Math.random() - 0.5) * 2000; }
                    const pFactor = 800 / (p.z + 1);
                    const pScreenX = cx + p.x * pFactor; const pScreenY = cy + p.y * pFactor;
                    if (pScreenX >= 0 && pScreenX <= canvas.width && pScreenY >= 0 && pScreenY <= canvas.height) {
                        const pSize = (1 - p.z / 2000) * 4.5; const alpha = (1 - p.z / 2000) * 0.6;
                        ctx.beginPath(); ctx.moveTo(pScreenX, pScreenY);
                        ctx.lineTo(cx + p.x * (800 / (p.z + flySpeed * 2.5 + 1)), cy + p.y * (800 / (p.z + flySpeed * 2.5 + 1)));
                        ctx.strokeStyle = `rgba(255, 220, 160, ${alpha})`; ctx.lineWidth = pSize * 0.4; ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
