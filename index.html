<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Звездное Небо</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000000;
        }
        canvas {
            display: block;
        }
    </style>
    <!-- Подключаем стабильную версию Three.js -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <script>
        // 1. Инициализация сцены, камеры и рендерера
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // Сдвигаем камеру немного назад, чтобы видеть поле изнутри
        camera.position.z = 500;

        // 2. Генерация текстуры круглой светящейся звезды без внешних картинок
        function createStarTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            
            // Создаем радиальный градиент (белый центр, размытый край)
            const gradient = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.2, 'rgba(255, 230, 100, 1)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 16, 16);
            
            return new THREE.CanvasTexture(canvas);
        }

        // 3. Создание геометрии для 5000 звезд
        const starsCount = 5000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(starsCount * 3);

        // Разбрасываем звезды в случайных координатах X, Y, Z
        for (let i = 0; i < starsCount * 3; i += 3) {
            positions[i] = (Math.random() - 0.5) * 2000;     // X
            positions[i + 1] = (Math.random() - 0.5) * 2000; // Y
            positions[i + 2] = (Math.random() - 0.5) * 2000; // Z
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // 4. Надежный стандартный материал со свечением
        const material = new THREE.PointsMaterial({
            color: 0xFFD700,             // Насыщенный желтый/золотой цвет
            size: 4,                     // Размер звезд
            map: createStarTexture(),    // Наша круглая размытая текстура
            transparent: true,
            blending: THREE.AdditiveBlending, // Эффект неонового сияния при наложении
            depthWrite: false
        });

        // Создаем массив звезд и добавляем на сцену
        const starField = new THREE.Points(geometry, material);
        scene.add(starField);

        // 5. Анимация (Вращение и Мерцание)
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // Медленное космическое вращение неба
            starField.rotation.y = time * 0.02;
            starField.rotation.x = time * 0.01;

            // Реализация мерцания через синусоиду изменения размера звезд
            material.size = 4 + Math.sin(time * 5.0) * 1.5;

            renderer.render(scene, camera);
        }

        animate();

        // 6. Поддержка изменения размеров экрана
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
